<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow">
  <title>Admin Markets — DayDine</title>
  <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@400;500;600;700;800&family=Newsreader:ital,wght@0,500;0,700;1,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/daydine.css">
  <style>
    main{max-width:1320px;margin:0 auto;padding:42px 24px 90px}.title{font-family:var(--serif);font-size:clamp(42px,6vw,78px);line-height:.96;margin:8px 0 12px}.dek{max-width:880px;color:var(--text-muted);font-size:17px;line-height:1.6}.panel{margin-top:24px;background:var(--surface-1);border:1px solid var(--border);box-shadow:var(--shadow);padding:20px}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.metric{background:var(--surface-2);border:1px solid var(--border);padding:16px}.metric b{display:block;font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--text-subtle);margin-bottom:8px}.metric span{font-family:var(--serif);font-size:34px}.markets{margin-top:22px;display:grid;gap:14px}.card{background:var(--surface-1);border:1px solid var(--border);box-shadow:var(--shadow-xs);padding:18px;display:grid;grid-template-columns:1fr auto;gap:18px}.name{font-family:var(--serif);font-size:30px;line-height:1.05;margin-bottom:6px}.sub{color:var(--text-muted);line-height:1.5}.pills{margin-top:10px;display:flex;gap:6px;flex-wrap:wrap}.pill{display:inline-flex;padding:5px 8px;border:1px solid var(--border);border-radius:999px;background:var(--surface-2);font-size:12px;font-weight:700;color:var(--accent)}.pill.warn{background:#fff4d8;color:#7a5200}.pill.ready{background:var(--band-excellent-bg);color:var(--band-excellent-fg);border-color:transparent}.pill.blocked{background:#ffe8e1;color:#8a2b1b;border-color:#f2c3b6}.actions{display:flex;flex-direction:column;gap:8px;min-width:220px}.btn,button{display:inline-flex;align-items:center;justify-content:center;padding:11px 14px;border:1px solid var(--accent-dark);border-radius:var(--radius);text-decoration:none;background:linear-gradient(135deg,var(--accent),var(--accent-hover));font-weight:800;color:var(--text);cursor:pointer}.btn.secondary,button.secondary{background:var(--surface-1);border-color:var(--border);color:var(--accent)}.small{font-size:12px;color:var(--text-subtle);margin-top:8px}.note{padding:14px 16px;background:var(--surface-2);border:1px solid var(--border);color:var(--text-muted);line-height:1.45}.empty{max-width:860px;margin:46px auto;padding:24px;background:var(--surface-1);border:1px solid var(--border);box-shadow:var(--shadow);color:var(--text-muted);line-height:1.55}.qa{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-top:14px}.qa-item{border:1px solid var(--border-soft);background:rgba(255,255,255,.22);padding:10px}.qa-item b{display:block;font-family:var(--mono);font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-subtle);margin-bottom:5px}.qa-item span{font-weight:800}.warnings,.review-box{margin-top:12px;padding:12px 14px;border:1px solid var(--border);background:var(--surface-2);color:var(--text-muted);line-height:1.45}.warnings b,.review-box b{color:var(--text)}.warnings ul{margin:8px 0 0;padding-left:18px}.review-list{display:grid;gap:8px;margin-top:10px}.review-item{border:1px solid var(--border-soft);background:rgba(255,255,255,.28);padding:10px}.review-head{display:flex;justify-content:space-between;gap:8px;flex-wrap:wrap;margin-bottom:6px}.review-title{font-weight:900;color:var(--text)}.review-meta{font-family:var(--mono);font-size:11px;color:var(--text-subtle)}.review-reason{margin-top:6px;font-size:13px}.tag{display:inline-flex;border:1px solid var(--border);border-radius:999px;padding:3px 7px;background:var(--surface-1);font-size:11px;font-weight:800;color:var(--accent)}.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px}.filter{border:1px solid var(--border);background:var(--surface-1);padding:8px 10px;color:var(--accent);font-weight:800;cursor:pointer}.filter.active{background:var(--accent);color:var(--text);border-color:var(--accent-dark)}@media(max-width:920px){.grid,.qa{grid-template-columns:1fr 1fr}.card{grid-template-columns:1fr}.actions{min-width:0}.title{font-size:44px}}@media(max-width:560px){.grid,.qa{grid-template-columns:1fr}}
  </style>
</head>
<body class="ed" data-page-type="admin">
<header class="masthead"><div class="masthead-inner"><a class="wordmark" href="/">Day<em>dine</em></a><div class="mast-issue">Admin · <b>Markets</b></div><nav class="mast-nav"><a href="/admin">Admin home</a><a href="/admin/reports">Reports</a><button class="secondary" id="logoutBtn" type="button">Logout</button></nav></div></header>
<main id="app"><section class="empty">Checking admin access…</section></main>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="/assets/daydine-firebase.js"></script>
<script src="/assets/daydine-auth.js"></script>
<script>
const app=document.getElementById('app');let STATE={filter:'all',areas:[],rankingIndex:null,readinessIndex:null,readiness:new Map(),coverage:new Map()};
function esc(s){return DayDineAuth.esc(s);}function metric(label,value){return `<div class="metric"><b>${esc(label)}</b><span>${esc(value)}</span></div>`;}function pill(label,cls){return `<span class="pill ${cls||''}">${esc(label)}</span>`;}function statusClass(status){if(status==='ready')return 'ready';if(status==='blocked')return 'blocked';return 'warn';}function fmt(v){return v==null?'—':String(v);}async function fetchJson(url){const res=await fetch(url,{cache:'no-store'});if(!res.ok)throw new Error(url+' '+res.status);return res.json();}async function maybeFetchJson(url){try{return await fetchJson(url);}catch(e){return null;}}
function renderMetrics(){const idx=STATE.readinessIndex;const ranking=STATE.rankingIndex||{};if(idx){document.getElementById('metrics').innerHTML=metric('Markets QA generated',idx.total_markets)+metric('Ready',idx.ready_markets)+metric('Warning',idx.warning_markets)+metric('Blocked',idx.blocked_markets)+metric('QA status',idx.status)+metric('QA generated',String(idx.generated_at||'—').slice(0,10))+metric('Public live',(ranking.available||[]).length)+metric('Coverage certs',STATE.coverage.size);return;}document.getElementById('metrics').innerHTML=metric('Configured',STATE.areas.length)+metric('Public live',(ranking.available||[]).length)+metric('Coverage certs',STATE.coverage.size)+metric('Last updated',ranking.last_updated||'—');}
function renderFilters(){const filters=['all','ready','warning','blocked'];document.getElementById('filters').innerHTML=filters.map(f=>`<button class="filter ${STATE.filter===f?'active':''}" data-filter="${esc(f)}">${esc(f[0].toUpperCase()+f.slice(1))}</button>`).join('');document.querySelectorAll('.filter').forEach(btn=>btn.addEventListener('click',()=>{STATE.filter=btn.dataset.filter;render();}));}
function ambiguityBlock(readiness){const groups=(readiness&&readiness.duplicate_or_ambiguous_gpid_groups)||[];if(!groups.length)return '';return `<details class="review-box" open><summary><b>Ambiguous Google Place groups to review</b> · ${groups.length}</summary><div class="review-list">${groups.map((g,i)=>{const names=(g.names||[]).filter(Boolean);const fhrsids=(g.fhrsids||[]).filter(Boolean);const label=names.length?names.join(' + '):(g.gpid||g.gpid_conflict||'Ambiguous group');const type=g.disambiguation_type||g.gpid_conflict||'duplicate_gpid';const reason=g.reason||'No reason recorded yet. Review FHRSIDs and Google Place mapping before marking accepted.';return `<article class="review-item"><div class="review-head"><span class="review-title">${esc(i+1)}. ${esc(label)}</span><span class="review-meta">${esc(type)}</span></div><div>${fhrsids.map(id=>`<span class="tag">FHRSID ${esc(id)}</span>`).join(' ')} ${g.gpid?`<span class="tag">GPID ${esc(g.gpid)}</span>`:''}</div><div class="review-reason">${esc(reason)}</div></article>`;}).join('')}</div></details>`;}
function qaBlock(readiness,coverage){if(!readiness){return '<div class="warnings"><b>No readiness JSON found yet.</b><br>Run market readiness generation before publishing.</div>';}const c=readiness.counts||{};const cc=coverage&&coverage.counts?coverage.counts:{};const warningItems=(readiness.top_warnings||[]).slice(0,4);return `<div class="qa"><div class="qa-item"><b>Total establishments</b><span>${fmt(c.total_establishments)}</span></div><div class="qa-item"><b>Candidate dining</b><span>${fmt(cc.candidate_dining_venues)}</span></div><div class="qa-item"><b>Rankable venues</b><span>${fmt(c.total_rankable)}</span></div><div class="qa-item"><b>Public ranking venues</b><span>${fmt(c.total_public_ranking_venues)}</span></div><div class="qa-item"><b>Known missing active</b><span>${fmt(c.active_known_missing_venues)}</span></div><div class="qa-item"><b>Known missing total</b><span>${fmt(c.known_missing_venues)}</span></div><div class="qa-item"><b>Ambiguous GPID groups</b><span>${fmt(c.duplicate_or_ambiguous_gpid_groups)}</span></div><div class="qa-item"><b>Coverage status</b><span>${esc((coverage&&coverage.status)||'not generated')}</span></div></div>${warningItems.length?`<div class="warnings"><b>Warnings</b><ul>${warningItems.map(w=>`<li>${esc(w)}</li>`).join('')}</ul></div>`:''}${ambiguityBlock(readiness)}`;}
function render(){renderMetrics();renderFilters();const liveBySlug=new Map([...(STATE.rankingIndex?.available||[]),...(STATE.rankingIndex?.operator_areas||[])].map(x=>[x.slug,x]));let cards=STATE.areas.map(area=>{const reg=liveBySlug.get(area.slug);const readiness=STATE.readiness.get(area.slug);const coverage=STATE.coverage.get(area.slug);const isLive=!!reg;const status=readiness?.status||(isLive?'warning':'blocked');return {area,reg,readiness,coverage,isLive,status};});if(STATE.filter!=='all')cards=cards.filter(x=>x.status===STATE.filter);document.getElementById('markets').innerHTML=cards.map(({area,reg,readiness,coverage,isLive,status})=>{const rankingHref='/assets/rankings/'+area.slug+'.json';const readinessHref='/assets/market-readiness/'+area.slug+'.json';const coverageHref='/assets/coverage/'+area.slug+'.json';const publicHref='/rankings/'+area.slug;return `<article class="card"><div><div class="name">${esc(area.display_name||area.slug)}</div><div class="sub">${esc(area.description||'')}<br><b>${esc(area.la_name||'')}</b> · ${esc(area.region||'')} · ${esc(area.area_type||'area')}</div><div class="pills">${pill(status,statusClass(status))}${pill(isLive?'live':'configured only',isLive?'ready':'warn')}${area.public?pill('public'):pill('operator only')}${area.operator?pill('operator'):''}${coverage?pill('coverage certificate','ready'):pill('coverage pending','warn')}</div><div class="small">Slug: ${esc(area.slug)}${reg?` · total venues: ${esc(reg.total_venues)} · top score: ${esc(reg.top_score||'—')}`:''}</div>${qaBlock(readiness,coverage)}</div><div class="actions"><a class="btn" href="${isLive?esc(publicHref):'/rankings'}" target="_blank" rel="noopener">Open public view</a><a class="btn secondary" href="${esc(readinessHref)}" target="_blank" rel="noopener">Open readiness JSON</a><a class="btn secondary" href="${esc(coverageHref)}" target="_blank" rel="noopener">Open coverage certificate</a><a class="btn secondary" href="${esc(rankingHref)}" target="_blank" rel="noopener">Open ranking JSON</a></div></article>`;}).join('')||'<div class="empty">No markets match this filter.</div>';}
async function loadData(){const [areas,index,readinessIndex,coverageIndex]=await Promise.all([fetchJson('/data/ranking_areas.json'),fetchJson('/assets/rankings/index.json'),maybeFetchJson('/assets/market-readiness/index.json'),maybeFetchJson('/assets/coverage/index.json')]);STATE.areas=areas.areas||[];STATE.rankingIndex=index;STATE.readinessIndex=readinessIndex;if(readinessIndex&&readinessIndex.markets){const rows=await Promise.all(readinessIndex.markets.map(m=>maybeFetchJson(m.readiness_url||('/assets/market-readiness/'+m.slug+'.json')).then(data=>[m.slug,data])));STATE.readiness=new Map(rows.filter(([,data])=>data));}if(coverageIndex&&coverageIndex.certificates){const rows=await Promise.all(coverageIndex.certificates.map(m=>maybeFetchJson(m.url||('/assets/coverage/'+m.market_slug+'.json')).then(data=>[m.market_slug,data])));STATE.coverage=new Map(rows.filter(([,data])=>data));}app.innerHTML=`<div class="kicker kicker-accent">Protected internal market console</div><h1 class="title">Market readiness.</h1><p class="dek">Review configured DayDine markets, readiness warnings, coverage certificates and ambiguous entity groups before publishing or selling a market.</p><section class="panel"><div class="note"><b>Current operating model:</b> new towns are still added through repo configuration and GitHub Actions. This authenticated page displays generated QA status from committed assets and future Firebase records.</div><div class="grid" id="metrics" style="margin-top:14px"></div><div class="toolbar" id="filters"></div></section><section class="markets" id="markets"></section>`;render();}
async function init(){await DayDineAuth.requireAuth({roles:['admin'],target:'#app'});document.getElementById('logoutBtn').addEventListener('click',DayDineAuth.signOut);try{await loadData();}catch(e){console.error(e);app.innerHTML='<section class="empty"><h1>Could not load market configuration</h1><p>Check ranking areas, ranking index, readiness outputs and coverage certificates.</p></section>';}}
init();
</script>
</body>
</html>
