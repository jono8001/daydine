<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DayDine – UK Restaurant Database</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --clr-bg: #f5f6f8;
      --clr-card: #ffffff;
      --clr-primary: #1a56db;
      --clr-primary-hover: #1444b0;
      --clr-text: #1e1e1e;
      --clr-muted: #6b7280;
      --clr-border: #e5e7eb;
      --clr-green: #16a34a;
      --clr-amber: #d97706;
      --clr-red: #dc2626;
      --clr-badge-bg: #eff6ff;
      --radius: 10px;
      --shadow: 0 1px 4px rgba(0,0,0,.06);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--clr-bg);
      color: var(--clr-text);
      line-height: 1.5;
      min-height: 100vh;
    }

    /* ---- Header ---- */
    header {
      background: var(--clr-primary);
      color: #fff;
      padding: 1.25rem 1.5rem;
    }
    .header-inner {
      max-width: 1080px;
      margin: 0 auto;
    }
    .logo { font-size: 1.6rem; font-weight: 700; letter-spacing: -.02em; }
    .logo span { font-weight: 400; opacity: .85; }
    .subtitle { font-size: .88rem; opacity: .8; margin-top: .15rem; }

    /* ---- Search panel ---- */
    .search-panel {
      background: var(--clr-card);
      border-bottom: 1px solid var(--clr-border);
      padding: 1.25rem 1.5rem;
      box-shadow: var(--shadow);
    }
    .search-inner {
      max-width: 1080px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: .75rem;
      align-items: end;
    }
    .field label {
      display: block;
      font-size: .78rem;
      font-weight: 600;
      color: var(--clr-muted);
      text-transform: uppercase;
      letter-spacing: .04em;
      margin-bottom: .3rem;
    }
    .field input, .field select {
      width: 100%;
      padding: .55rem .75rem;
      font-size: .92rem;
      border: 1px solid var(--clr-border);
      border-radius: 8px;
      background: #fff;
      color: var(--clr-text);
      outline: none;
      transition: border-color .15s;
    }
    .field input:focus, .field select:focus {
      border-color: var(--clr-primary);
    }
    .btn-search {
      padding: .6rem 1.5rem;
      background: var(--clr-primary);
      color: #fff;
      font-size: .92rem;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background .15s;
      white-space: nowrap;
    }
    .btn-search:hover { background: var(--clr-primary-hover); }
    .btn-search:disabled { opacity: .5; cursor: not-allowed; }

    /* ---- Main ---- */
    main {
      max-width: 1080px;
      margin: 1.5rem auto;
      padding: 0 1.5rem;
    }
    .results-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
      flex-wrap: wrap;
      gap: .5rem;
    }
    .results-count { font-size: .88rem; color: var(--clr-muted); }
    .status {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--clr-muted);
      font-size: 1rem;
    }

    /* ---- Results table ---- */
    .table-wrap { overflow-x: auto; }
    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--clr-card);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
      font-size: .88rem;
    }
    thead { background: #f9fafb; }
    th {
      text-align: left;
      padding: .7rem .9rem;
      font-size: .76rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .04em;
      color: var(--clr-muted);
      border-bottom: 2px solid var(--clr-border);
    }
    td {
      padding: .65rem .9rem;
      border-bottom: 1px solid var(--clr-border);
      vertical-align: top;
    }
    tbody tr:hover { background: #f9fafb; }
    .name-cell { font-weight: 600; }

    /* ---- Rating badge ---- */
    .rating-badge {
      display: inline-block;
      padding: .15rem .55rem;
      border-radius: 6px;
      font-size: .8rem;
      font-weight: 700;
      min-width: 1.8rem;
      text-align: center;
    }
    .rating-5 { background: #dcfce7; color: var(--clr-green); }
    .rating-4 { background: #dcfce7; color: var(--clr-green); }
    .rating-3 { background: #fef9c3; color: var(--clr-amber); }
    .rating-2 { background: #fed7aa; color: var(--clr-amber); }
    .rating-1 { background: #fecaca; color: var(--clr-red); }
    .rating-0 { background: #fecaca; color: var(--clr-red); }
    .rating-exempt { background: #e5e7eb; color: var(--clr-muted); font-size: .72rem; }

    /* ---- Pagination ---- */
    .pagination {
      display: flex;
      justify-content: center;
      gap: .5rem;
      margin-top: 1.25rem;
      flex-wrap: wrap;
    }
    .page-btn {
      padding: .4rem .85rem;
      border: 1px solid var(--clr-border);
      border-radius: 6px;
      background: var(--clr-card);
      color: var(--clr-text);
      font-size: .85rem;
      cursor: pointer;
      transition: all .15s;
    }
    .page-btn:hover { border-color: var(--clr-primary); color: var(--clr-primary); }
    .page-btn.active { background: var(--clr-primary); color: #fff; border-color: var(--clr-primary); }
    .page-btn:disabled { opacity: .4; cursor: not-allowed; }

    /* ---- Scores tooltip ---- */
    .scores-detail {
      font-size: .78rem;
      color: var(--clr-muted);
      line-height: 1.6;
    }

    /* ---- Footer ---- */
    footer {
      text-align: center;
      padding: 2rem 1rem;
      color: var(--clr-muted);
      font-size: .8rem;
    }

    /* ---- Responsive ---- */
    @media (max-width: 640px) {
      .search-inner { grid-template-columns: 1fr; }
      th, td { padding: .5rem .6rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">DayDine <span>UK</span></div>
    <div class="subtitle">264,791 FSA food hygiene establishments</div>
  </div>
</header>

<div class="search-panel">
  <div class="search-inner">
    <div class="field">
      <label for="inputLA">Local Authority</label>
      <input type="text" id="inputLA" placeholder="e.g. Camden, Leeds, Birmingham">
    </div>
    <div class="field">
      <label for="selectRating">Rating</label>
      <select id="selectRating">
        <option value="">Any</option>
        <option value="5">5 — Very good</option>
        <option value="4">4 — Good</option>
        <option value="3">3 — Generally satisfactory</option>
        <option value="2">2 — Improvement necessary</option>
        <option value="1">1 — Major improvement necessary</option>
        <option value="0">0 — Urgent improvement necessary</option>
      </select>
    </div>
    <div class="field">
      <label for="inputType">Business Type</label>
      <input type="text" id="inputType" placeholder="e.g. Restaurant/Cafe/Canteen">
    </div>
    <div class="field">
      <label for="inputPostcode">Postcode</label>
      <input type="text" id="inputPostcode" placeholder="e.g. SW1A or E1 6AN">
    </div>
    <button class="btn-search" id="btnSearch">Search</button>
  </div>
</div>

<main>
  <div id="status" class="status">Enter a Local Authority or Postcode and press Search.</div>
  <div id="resultsArea" style="display:none;">
    <div class="results-bar">
      <span class="results-count" id="resultsCount"></span>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Address</th>
            <th>Postcode</th>
            <th>Type</th>
            <th>Rating</th>
            <th>Last Inspection</th>
            <th>Scores</th>
          </tr>
        </thead>
        <tbody id="resultsBody"></tbody>
      </table>
    </div>
    <div class="pagination" id="pagination"></div>
  </div>
</main>

<footer>
  DayDine &copy; 2026 &mdash; Data from the UK Food Standards Agency
</footer>

<!-- Firebase Realtime Database SDK (compat) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>
  // ============================================================
  //  FIREBASE CONFIG — replace placeholders with your values
  // ============================================================
  const firebaseConfig = {
    apiKey:            "FIREBASE_API_KEY",
    authDomain:        "recursive-research-eu.firebaseapp.com",
    databaseURL:       "https://recursive-research-eu-default-rtdb.europe-west1.firebasedatabase.app",
    projectId:         "recursive-research-eu",
    storageBucket:     "recursive-research-eu.firebasestorage.app",
    messagingSenderId: "FIREBASE_MESSAGING_SENDER_ID",
    appId:             "FIREBASE_APP_ID"
  };
  // ============================================================

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();
  const DAYDINE_REF = db.ref("daydine");

  const PAGE_SIZE = 50;
  let currentResults = [];
  let currentPage = 0;

  // ---- DOM refs ----
  const inputLA       = document.getElementById("inputLA");
  const selectRating  = document.getElementById("selectRating");
  const inputType     = document.getElementById("inputType");
  const inputPostcode = document.getElementById("inputPostcode");
  const btnSearch     = document.getElementById("btnSearch");
  const statusEl      = document.getElementById("status");
  const resultsArea   = document.getElementById("resultsArea");
  const resultsBody   = document.getElementById("resultsBody");
  const resultsCount  = document.getElementById("resultsCount");
  const paginationEl  = document.getElementById("pagination");

  // ---- Search ----
  btnSearch.addEventListener("click", runSearch);
  document.querySelectorAll(".field input, .field select").forEach(el => {
    el.addEventListener("keydown", e => { if (e.key === "Enter") runSearch(); });
  });

  async function runSearch() {
    const la       = inputLA.value.trim();
    const rating   = selectRating.value;
    const type     = inputType.value.trim();
    const postcode = inputPostcode.value.trim().toUpperCase();

    if (!la && !postcode) {
      showStatus("Please enter at least a Local Authority or Postcode to search.");
      return;
    }

    showStatus("Searching 264,791 establishments…");
    btnSearch.disabled = true;

    try {
      let query;

      // Use the most selective indexed field as the primary Firebase query.
      // Apply remaining filters client-side.
      if (la) {
        query = DAYDINE_REF.orderByChild("la").equalTo(la);
      } else if (postcode.length <= 4) {
        // Outcode prefix search: e.g. "SW1A"
        query = DAYDINE_REF.orderByChild("postcode").startAt(postcode).endAt(postcode + "\uf8ff");
      } else {
        query = DAYDINE_REF.orderByChild("postcode").equalTo(postcode);
      }

      const snapshot = await query.once("value");
      const data = snapshot.val();

      if (!data) {
        currentResults = [];
      } else {
        let entries = Object.entries(data).map(([id, d]) => ({ id, ...d }));

        // Client-side filters
        if (rating !== "") {
          const r = parseInt(rating, 10);
          entries = entries.filter(d => d.rating === r);
        }
        if (type) {
          const tLower = type.toLowerCase();
          entries = entries.filter(d => d.type && d.type.toLowerCase().includes(tLower));
        }
        if (la && postcode) {
          // LA was used as primary query; also filter by postcode client-side
          if (postcode.length <= 4) {
            entries = entries.filter(d => d.postcode && d.postcode.toUpperCase().startsWith(postcode));
          } else {
            entries = entries.filter(d => d.postcode && d.postcode.toUpperCase() === postcode);
          }
        }

        // Sort: highest rating first, then name
        entries.sort((a, b) => (b.rating || 0) - (a.rating || 0) || (a.name || "").localeCompare(b.name || ""));
        currentResults = entries;
      }

      currentPage = 0;
      renderResults();
    } catch (err) {
      console.error(err);
      showStatus("Error: " + err.message + ". Check Firebase config & database rules.");
    } finally {
      btnSearch.disabled = false;
    }
  }

  // ---- Render ----
  function renderResults() {
    if (currentResults.length === 0) {
      showStatus("No establishments found. Try a different search.");
      return;
    }

    statusEl.style.display = "none";
    resultsArea.style.display = "";

    const totalPages = Math.ceil(currentResults.length / PAGE_SIZE);
    const start = currentPage * PAGE_SIZE;
    const page = currentResults.slice(start, start + PAGE_SIZE);

    resultsCount.textContent = currentResults.length.toLocaleString() + " result"
      + (currentResults.length !== 1 ? "s" : "")
      + " — page " + (currentPage + 1) + " of " + totalPages;

    resultsBody.innerHTML = page.map(d => `
      <tr>
        <td class="name-cell">${esc(d.name || "—")}</td>
        <td>${esc(d.address || "—")}</td>
        <td>${esc(d.postcode || "—")}</td>
        <td>${esc(d.type || "—")}</td>
        <td>${ratingBadge(d.rating)}</td>
        <td>${esc(d.lastInspection || "—")}</td>
        <td>${formatScores(d.scores)}</td>
      </tr>
    `).join("");

    // Pagination
    paginationEl.innerHTML = "";
    if (totalPages > 1) {
      addPageBtn("« Prev", currentPage > 0, () => { currentPage--; renderResults(); });
      const maxBtns = 7;
      let startP = Math.max(0, currentPage - Math.floor(maxBtns / 2));
      let endP = Math.min(totalPages, startP + maxBtns);
      if (endP - startP < maxBtns) startP = Math.max(0, endP - maxBtns);
      for (let i = startP; i < endP; i++) {
        addPageBtn(i + 1, true, () => { currentPage = i; renderResults(); }, i === currentPage);
      }
      addPageBtn("Next »", currentPage < totalPages - 1, () => { currentPage++; renderResults(); });
    }

    window.scrollTo({ top: 0, behavior: "smooth" });
  }

  function addPageBtn(label, enabled, onClick, active) {
    const btn = document.createElement("button");
    btn.className = "page-btn" + (active ? " active" : "");
    btn.textContent = label;
    btn.disabled = !enabled;
    if (enabled) btn.addEventListener("click", onClick);
    paginationEl.appendChild(btn);
  }

  function ratingBadge(rating) {
    if (rating === null || rating === undefined || rating === "Exempt") {
      return '<span class="rating-badge rating-exempt">Exempt</span>';
    }
    const r = parseInt(rating, 10);
    if (isNaN(r)) return '<span class="rating-badge rating-exempt">' + esc(String(rating)) + '</span>';
    return '<span class="rating-badge rating-' + r + '">' + r + '</span>';
  }

  function formatScores(scores) {
    if (!scores || typeof scores !== "object") return '<span class="scores-detail">—</span>';
    const parts = [];
    if (scores.hygiene !== undefined) parts.push("Hygiene: " + scores.hygiene);
    if (scores.structural !== undefined) parts.push("Structural: " + scores.structural);
    if (scores.management !== undefined) parts.push("Management: " + scores.management);
    if (parts.length === 0) return '<span class="scores-detail">—</span>';
    return '<span class="scores-detail">' + parts.map(esc).join("<br>") + '</span>';
  }

  function showStatus(msg) {
    resultsArea.style.display = "none";
    statusEl.style.display = "";
    statusEl.textContent = msg;
  }

  function esc(s) {
    const el = document.createElement("span");
    el.textContent = s;
    return el.innerHTML;
  }
</script>
</body>
</html>
