<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DayDine – UK Restaurant Ratings</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e1117;
      --bg-card: #161b22;
      --bg-row-hover: #1c2333;
      --bg-expanded: #131820;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --accent: #58a6ff;
      --accent-hover: #79b8ff;
      --green: #3fb950;
      --yellow: #d29922;
      --orange: #db6d28;
      --red: #f85149;
      --radius: 8px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      min-height: 100vh;
    }

    /* ---- Header ---- */
    header {
      border-bottom: 1px solid var(--border);
      padding: 1.2rem 1.5rem;
    }
    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: baseline;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .logo { font-size: 1.5rem; font-weight: 700; color: var(--accent); letter-spacing: -.02em; }
    .tagline { font-size: .85rem; color: var(--text-muted); }

    /* ---- Filters ---- */
    .filters {
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      padding: 1rem 1.5rem;
    }
    .filters-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      gap: .6rem;
      flex-wrap: wrap;
      align-items: end;
    }
    .fld { display: flex; flex-direction: column; gap: .25rem; }
    .fld label {
      font-size: .7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: var(--text-muted);
    }
    .fld input, .fld select {
      padding: .5rem .7rem;
      font-size: .85rem;
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      outline: none;
      min-width: 160px;
    }
    .fld input:focus, .fld select:focus { border-color: var(--accent); }
    .fld select option { background: var(--bg-card); }
    .btn {
      padding: .5rem 1.3rem;
      background: var(--accent);
      color: #000;
      font-weight: 600;
      font-size: .85rem;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background .15s;
      align-self: end;
    }
    .btn:hover { background: var(--accent-hover); }
    .btn:disabled { opacity: .45; cursor: not-allowed; }

    /* ---- Main ---- */
    main { max-width: 1200px; margin: 1.25rem auto; padding: 0 1.5rem; }
    .status { text-align: center; padding: 3rem 1rem; color: var(--text-muted); }
    .meta-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: .75rem;
      font-size: .82rem;
      color: var(--text-muted);
      flex-wrap: wrap;
      gap: .5rem;
    }

    /* ---- Table ---- */
    .table-wrap { overflow-x: auto; border: 1px solid var(--border); border-radius: var(--radius); }
    table { width: 100%; border-collapse: collapse; font-size: .85rem; }
    thead { background: var(--bg-card); }
    th {
      text-align: left;
      padding: .6rem .8rem;
      font-size: .72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      user-select: none;
      white-space: nowrap;
    }
    th.sortable { cursor: pointer; }
    th.sortable:hover { color: var(--accent); }
    th .arrow { margin-left: .3rem; font-size: .65rem; }
    td { padding: .55rem .8rem; border-bottom: 1px solid var(--border); vertical-align: middle; }
    tbody tr { transition: background .1s; }
    tbody tr:hover { background: var(--bg-row-hover); }
    tbody tr.expanded-parent { background: var(--bg-row-hover); }
    .name-cell { font-weight: 600; cursor: pointer; color: var(--accent); }
    .name-cell:hover { text-decoration: underline; }

    /* ---- Rating colours ---- */
    .rating {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 2rem;
      padding: .15rem .5rem;
      border-radius: 5px;
      font-weight: 700;
      font-size: .82rem;
      text-align: center;
    }
    .r5 { background: rgba(63,185,80,.15); color: var(--green); }
    .r4 { background: rgba(63,185,80,.10); color: var(--green); }
    .r3 { background: rgba(210,153,34,.15); color: var(--yellow); }
    .r2 { background: rgba(219,109,40,.15); color: var(--orange); }
    .r1 { background: rgba(248,81,73,.12); color: var(--red); }
    .r0 { background: rgba(248,81,73,.18); color: var(--red); }
    .r-exempt { background: rgba(139,148,158,.12); color: var(--text-muted); font-size: .72rem; }

    /* ---- Expanded detail row ---- */
    .detail-row td { padding: 0; border-bottom: 1px solid var(--border); }
    .detail-inner {
      padding: .8rem 1rem .8rem 2.5rem;
      background: var(--bg-expanded);
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: .6rem 2rem;
      font-size: .82rem;
    }
    .detail-inner .dl-label {
      font-size: .7rem;
      text-transform: uppercase;
      letter-spacing: .04em;
      color: var(--text-muted);
      margin-bottom: .1rem;
    }
    .detail-inner .dl-val { color: var(--text); }
    .score-bar-wrap { display: flex; align-items: center; gap: .5rem; margin-top: .15rem; }
    .score-bar {
      flex: 1;
      height: 6px;
      border-radius: 3px;
      background: var(--border);
      max-width: 120px;
    }
    .score-bar-fill { height: 100%; border-radius: 3px; }
    .score-val { font-size: .78rem; font-weight: 600; min-width: 1.5rem; }

    /* ---- Pagination ---- */
    .pagination { display: flex; justify-content: center; gap: .4rem; margin-top: 1rem; flex-wrap: wrap; }
    .pg-btn {
      padding: .35rem .75rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: transparent;
      color: var(--text);
      font-size: .82rem;
      cursor: pointer;
      transition: all .15s;
    }
    .pg-btn:hover { border-color: var(--accent); color: var(--accent); }
    .pg-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }
    .pg-btn:disabled { opacity: .3; cursor: not-allowed; }

    footer { text-align: center; padding: 2rem 1rem; color: var(--text-muted); font-size: .75rem; }

    @media (max-width: 700px) {
      .fld input, .fld select { min-width: 120px; }
      .detail-inner { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">DayDine</div>
    <div class="tagline">UK Restaurant Tracking &amp; Ratings &mdash; 264,791 FSA establishments</div>
  </div>
</header>

<div class="filters">
  <div class="filters-inner">
    <div class="fld">
      <label for="fName">Name</label>
      <input type="text" id="fName" placeholder="Search name…">
    </div>
    <div class="fld">
      <label for="fLA">Local Authority</label>
      <input type="text" id="fLA" placeholder="e.g. Camden">
    </div>
    <div class="fld">
      <label for="fType">Business Type</label>
      <input type="text" id="fType" placeholder="e.g. Restaurant">
    </div>
    <div class="fld">
      <label for="fRating">Rating</label>
      <select id="fRating">
        <option value="">Any</option>
        <option value="5">5 — Very good</option>
        <option value="4">4 — Good</option>
        <option value="3">3 — Generally satisfactory</option>
        <option value="2">2 — Improvement necessary</option>
        <option value="1">1 — Major improvement necessary</option>
        <option value="0">0 — Urgent improvement necessary</option>
      </select>
    </div>
    <button class="btn" id="btnSearch">Search</button>
  </div>
</div>

<main>
  <div id="status" class="status">Enter a Local Authority and press Search to query the database.</div>
  <div id="resultsWrap" style="display:none;">
    <div class="meta-bar">
      <span id="metaCount"></span>
      <span id="metaSort"></span>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th class="sortable" data-key="name">Name <span class="arrow"></span></th>
            <th>Address</th>
            <th>Postcode</th>
            <th>Local Authority</th>
            <th>Type</th>
            <th class="sortable" data-key="rating">Rating <span class="arrow"></span></th>
            <th class="sortable" data-key="lastInspection">Last Inspected <span class="arrow"></span></th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
    <div class="pagination" id="pagination"></div>
  </div>
</main>

<footer>DayDine &copy; 2026 — Data sourced from the UK Food Standards Agency</footer>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>
  // ============================================================
  //  FIREBASE CONFIG — replace placeholders with your real values
  // ============================================================
  const firebaseConfig = {
    apiKey:            "FIREBASE_API_KEY",
    authDomain:        "recursive-research-eu.firebaseapp.com",
    databaseURL:       "https://recursive-research-eu-default-rtdb.europe-west1.firebasedatabase.app",
    projectId:         "recursive-research-eu",
    storageBucket:     "recursive-research-eu.firebasestorage.app",
    messagingSenderId: "FIREBASE_MESSAGING_SENDER_ID",
    appId:             "FIREBASE_APP_ID"
  };
  // ============================================================

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();
  const REF = db.ref("daydine");

  const PAGE_SIZE = 50;
  let results = [];
  let page = 0;
  let sortKey = "name";
  let sortAsc = true;
  let expandedId = null;

  // DOM
  const fName   = document.getElementById("fName");
  const fLA     = document.getElementById("fLA");
  const fType   = document.getElementById("fType");
  const fRating = document.getElementById("fRating");
  const btnSearch   = document.getElementById("btnSearch");
  const statusEl    = document.getElementById("status");
  const resultsWrap = document.getElementById("resultsWrap");
  const tbody       = document.getElementById("tbody");
  const metaCount   = document.getElementById("metaCount");
  const metaSort    = document.getElementById("metaSort");
  const pagEl       = document.getElementById("pagination");

  // ---- Events ----
  btnSearch.addEventListener("click", search);
  document.querySelectorAll(".fld input, .fld select").forEach(el => {
    el.addEventListener("keydown", e => { if (e.key === "Enter") search(); });
  });

  document.querySelectorAll("th.sortable").forEach(th => {
    th.addEventListener("click", () => {
      const key = th.dataset.key;
      if (sortKey === key) { sortAsc = !sortAsc; } else { sortKey = key; sortAsc = true; }
      applySort();
      page = 0;
      render();
      updateSortArrows();
    });
  });

  // ---- Search ----
  async function search() {
    const la     = fLA.value.trim();
    const name   = fName.value.trim().toLowerCase();
    const type   = fType.value.trim().toLowerCase();
    const rating = fRating.value;

    if (!la) {
      showStatus("Please enter a Local Authority to narrow the query (264k records is too large to fetch at once).");
      return;
    }

    showStatus("Querying…");
    btnSearch.disabled = true;

    try {
      const snap = await REF.orderByChild("la").equalTo(la).once("value");
      const data = snap.val();

      if (!data) { results = []; }
      else {
        let entries = Object.entries(data).map(([id, d]) => ({ _id: id, ...d }));

        if (name)        entries = entries.filter(d => d.name && d.name.toLowerCase().includes(name));
        if (type)        entries = entries.filter(d => d.type && d.type.toLowerCase().includes(type));
        if (rating !== "") entries = entries.filter(d => d.rating === parseInt(rating, 10));

        results = entries;
      }

      sortKey = "name"; sortAsc = true;
      applySort();
      updateSortArrows();
      page = 0;
      expandedId = null;
      render();
    } catch (err) {
      console.error(err);
      showStatus("Error: " + err.message);
    } finally {
      btnSearch.disabled = false;
    }
  }

  // ---- Sort ----
  function applySort() {
    results.sort((a, b) => {
      let va = a[sortKey], vb = b[sortKey];
      if (sortKey === "rating") {
        va = (typeof va === "number") ? va : -1;
        vb = (typeof vb === "number") ? vb : -1;
        return sortAsc ? va - vb : vb - va;
      }
      if (sortKey === "lastInspection") {
        va = va ? new Date(va).getTime() : 0;
        vb = vb ? new Date(vb).getTime() : 0;
        return sortAsc ? va - vb : vb - va;
      }
      va = (va || "").toString().toLowerCase();
      vb = (vb || "").toString().toLowerCase();
      return sortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
    });
  }

  function updateSortArrows() {
    document.querySelectorAll("th.sortable").forEach(th => {
      const arrow = th.querySelector(".arrow");
      if (th.dataset.key === sortKey) {
        arrow.textContent = sortAsc ? "▲" : "▼";
      } else {
        arrow.textContent = "";
      }
    });
    metaSort.textContent = "Sorted by " + sortKey + (sortAsc ? " ↑" : " ↓");
  }

  // ---- Render ----
  function render() {
    if (results.length === 0) {
      showStatus("No establishments found. Try a different Local Authority or adjust filters.");
      return;
    }
    statusEl.style.display = "none";
    resultsWrap.style.display = "";

    const totalPages = Math.ceil(results.length / PAGE_SIZE);
    const start = page * PAGE_SIZE;
    const slice = results.slice(start, start + PAGE_SIZE);

    metaCount.textContent = results.length.toLocaleString() + " result" + (results.length !== 1 ? "s" : "")
      + " — page " + (page + 1) + " of " + totalPages;

    tbody.innerHTML = "";
    slice.forEach(d => {
      // Main row
      const tr = document.createElement("tr");
      if (d._id === expandedId) tr.classList.add("expanded-parent");
      tr.innerHTML =
        '<td class="name-cell">' + esc(d.name || "—") + '</td>' +
        '<td>' + esc(d.address || "—") + '</td>' +
        '<td>' + esc(d.postcode || "—") + '</td>' +
        '<td>' + esc(d.la || "—") + '</td>' +
        '<td>' + esc(d.type || "—") + '</td>' +
        '<td>' + ratingHTML(d.rating) + '</td>' +
        '<td>' + esc(d.lastInspection || "—") + '</td>';
      tr.querySelector(".name-cell").addEventListener("click", () => toggleExpand(d._id));
      tbody.appendChild(tr);

      // Detail row
      if (d._id === expandedId) {
        const dr = document.createElement("tr");
        dr.className = "detail-row";
        const td = document.createElement("td");
        td.colSpan = 7;
        td.innerHTML = buildDetail(d);
        dr.appendChild(td);
        tbody.appendChild(dr);
      }
    });

    // Pagination
    pagEl.innerHTML = "";
    if (totalPages > 1) {
      pgBtn("« Prev", page > 0, () => { page--; render(); scrollTop(); });
      let s = Math.max(0, page - 3), e = Math.min(totalPages, s + 7);
      if (e - s < 7) s = Math.max(0, e - 7);
      for (let i = s; i < e; i++) {
        pgBtn(i + 1, true, () => { page = i; render(); scrollTop(); }, i === page);
      }
      pgBtn("Next »", page < totalPages - 1, () => { page++; render(); scrollTop(); });
    }
  }

  function toggleExpand(id) {
    expandedId = (expandedId === id) ? null : id;
    render();
  }

  function buildDetail(d) {
    const s = d.scores || {};
    return '<div class="detail-inner">' +
      dlBlock("Full Address", (d.address || "") + (d.postcode ? ", " + d.postcode : "")) +
      dlBlock("Local Authority", d.la) +
      dlBlock("Business Type", d.type) +
      dlBlock("Last Inspection", d.lastInspection) +
      scoreBlock("Hygiene", s.hygiene) +
      scoreBlock("Structural", s.structural) +
      scoreBlock("Management", s.management) +
    '</div>';
  }

  function dlBlock(label, val) {
    return '<div><div class="dl-label">' + esc(label) + '</div><div class="dl-val">' + esc(val || "—") + '</div></div>';
  }

  function scoreBlock(label, val) {
    if (val === undefined || val === null) return dlBlock(label, "—");
    // FSA sub-scores: 0 is best, higher is worse. Max typically 20 for hygiene/structural, 30 for management.
    const max = (label === "Management") ? 30 : 20;
    const pct = Math.max(0, Math.min(100, ((max - val) / max) * 100));
    const color = pct >= 70 ? "var(--green)" : pct >= 40 ? "var(--yellow)" : "var(--red)";
    return '<div>' +
      '<div class="dl-label">' + esc(label) + '</div>' +
      '<div class="score-bar-wrap">' +
        '<div class="score-bar"><div class="score-bar-fill" style="width:' + pct + '%;background:' + color + ';"></div></div>' +
        '<span class="score-val" style="color:' + color + '">' + val + '</span>' +
      '</div></div>';
  }

  function ratingHTML(r) {
    if (r === null || r === undefined || r === "Exempt")
      return '<span class="rating r-exempt">Exempt</span>';
    const n = parseInt(r, 10);
    if (isNaN(n)) return '<span class="rating r-exempt">' + esc(String(r)) + '</span>';
    return '<span class="rating r' + n + '">' + n + '</span>';
  }

  function pgBtn(label, enabled, fn, active) {
    const b = document.createElement("button");
    b.className = "pg-btn" + (active ? " active" : "");
    b.textContent = label;
    b.disabled = !enabled;
    if (enabled) b.addEventListener("click", fn);
    pagEl.appendChild(b);
  }

  function showStatus(msg) {
    resultsWrap.style.display = "none";
    statusEl.style.display = "";
    statusEl.textContent = msg;
  }

  function scrollTop() { window.scrollTo({ top: 0, behavior: "smooth" }); }

  function esc(s) {
    const el = document.createElement("span");
    el.textContent = s;
    return el.innerHTML;
  }
</script>
</body>
</html>
