<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DayDine – UK Restaurant Ratings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #F5F0E8;
      --bg-card: #ffffff;
      --bg-row-hover: #FBF8F3;
      --bg-expanded: #FAF7F1;
      --border: #E5DFD3;
      --text: #2D2D2D;
      --text-muted: #7A7265;
      --accent: #D4942A;
      --accent-hover: #B87D1E;
      --accent-light: #FDF5E9;
      --green: #2E7D32;
      --green-bg: #E8F5E9;
      --yellow: #C27A00;
      --yellow-bg: #FFF8E1;
      --orange: #D84315;
      --orange-bg: #FBE9E7;
      --red: #C62828;
      --red-bg: #FFEBEE;
      --radius: 10px;
      --shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
      --shadow-md: 0 4px 12px rgba(0,0,0,.07), 0 1px 3px rgba(0,0,0,.04);
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      min-height: 100vh;
    }

    /* ---- Header ---- */
    header {
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      padding: 1.1rem 1.5rem;
      box-shadow: var(--shadow);
    }
    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: baseline;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .logo {
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -.02em;
    }
    /* Amber dot on the "i" — we split into Day + D + i + ne with the i styled */
    .logo-day { color: var(--text); }
    .logo-d { color: var(--text); }
    .logo-i { position: relative; color: var(--text); }
    .logo-i::after {
      content: '';
      position: absolute;
      top: -.02em;
      left: 50%;
      transform: translateX(-50%);
      width: .32em;
      height: .32em;
      background: var(--accent);
      border-radius: 50%;
    }
    /* Hide the natural dot on the i by making it transparent and overlaying */
    .logo-i { font-style: normal; }
    .logo-ne { color: var(--text); }
    .tagline { font-size: .85rem; color: var(--text-muted); }

    /* ---- Filters ---- */
    .filters {
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      padding: 1rem 1.5rem;
    }
    .filters-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      gap: .6rem;
      flex-wrap: wrap;
      align-items: end;
    }
    .fld { display: flex; flex-direction: column; gap: .25rem; }
    .fld label {
      font-size: .7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: var(--text-muted);
    }
    .fld input, .fld select {
      padding: .5rem .75rem;
      font-size: .85rem;
      font-family: inherit;
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      outline: none;
      min-width: 160px;
      transition: border-color .15s, box-shadow .15s;
    }
    .fld input:focus, .fld select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(212,148,42,.15);
    }
    .fld select option { background: var(--bg-card); }
    .btn {
      padding: .5rem 1.4rem;
      background: var(--accent);
      color: #fff;
      font-family: inherit;
      font-weight: 600;
      font-size: .85rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background .15s, box-shadow .15s;
      align-self: end;
      box-shadow: var(--shadow);
    }
    .btn:hover { background: var(--accent-hover); box-shadow: var(--shadow-md); }
    .btn:disabled { opacity: .45; cursor: not-allowed; }

    /* ---- Main ---- */
    main { max-width: 1200px; margin: 1.5rem auto; padding: 0 1.5rem; }
    .status {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-muted);
      font-size: .95rem;
    }
    .meta-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: .75rem;
      font-size: .82rem;
      color: var(--text-muted);
      flex-wrap: wrap;
      gap: .5rem;
    }

    /* ---- Table ---- */
    .table-wrap {
      overflow-x: auto;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow-md);
    }
    table { width: 100%; border-collapse: collapse; font-size: .85rem; }
    thead { background: #FAF7F2; }
    th {
      text-align: left;
      padding: .65rem .85rem;
      font-size: .72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: var(--text-muted);
      border-bottom: 2px solid var(--border);
      user-select: none;
      white-space: nowrap;
    }
    th.sortable { cursor: pointer; }
    th.sortable:hover { color: var(--accent); }
    th .arrow { margin-left: .3rem; font-size: .65rem; }
    td {
      padding: .6rem .85rem;
      border-bottom: 1px solid #EDE8DF;
      vertical-align: middle;
    }
    tbody tr { background: var(--bg-card); transition: background .1s; }
    tbody tr:hover { background: var(--bg-row-hover); }
    tbody tr.expanded-parent { background: var(--accent-light); }
    .name-cell {
      font-weight: 600;
      cursor: pointer;
      color: var(--accent);
    }
    .name-cell:hover { color: var(--accent-hover); text-decoration: underline; }

    /* ---- Rating badges ---- */
    .rating {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 2rem;
      padding: .2rem .55rem;
      border-radius: 6px;
      font-weight: 700;
      font-size: .82rem;
      text-align: center;
    }
    .r5 { background: var(--green-bg); color: var(--green); }
    .r4 { background: var(--green-bg); color: var(--green); }
    .r3 { background: var(--yellow-bg); color: var(--yellow); }
    .r2 { background: var(--orange-bg); color: var(--orange); }
    .r1 { background: var(--red-bg); color: var(--red); }
    .r0 { background: var(--red-bg); color: var(--red); }
    .r-exempt { background: #F0EDE6; color: var(--text-muted); font-size: .72rem; }

    /* ---- Google rating inline ---- */
    .google-rating {
      display: inline-flex;
      align-items: center;
      gap: .3rem;
      font-size: .8rem;
      color: var(--text-muted);
      white-space: nowrap;
    }
    .google-star { color: #FBBC04; font-size: .9rem; }
    .google-score { font-weight: 600; color: var(--text); }
    .google-count { font-size: .72rem; }

    /* ---- Expanded detail row ---- */
    .detail-row td { padding: 0; border-bottom: 1px solid var(--border); }
    .detail-inner {
      padding: .9rem 1.1rem .9rem 2.5rem;
      background: var(--bg-expanded);
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: .7rem 2rem;
      font-size: .82rem;
    }
    .detail-inner .dl-label {
      font-size: .7rem;
      text-transform: uppercase;
      letter-spacing: .04em;
      color: var(--text-muted);
      margin-bottom: .15rem;
    }
    .detail-inner .dl-val { color: var(--text); font-weight: 500; }
    .score-bar-wrap { display: flex; align-items: center; gap: .5rem; margin-top: .2rem; }
    .score-bar {
      flex: 1;
      height: 7px;
      border-radius: 4px;
      background: var(--border);
      max-width: 120px;
    }
    .score-bar-fill { height: 100%; border-radius: 4px; }
    .score-val { font-size: .78rem; font-weight: 600; min-width: 1.5rem; }

    /* ---- Pagination ---- */
    .pagination { display: flex; justify-content: center; gap: .4rem; margin-top: 1.25rem; flex-wrap: wrap; }
    .pg-btn {
      padding: .38rem .8rem;
      border: 1px solid var(--border);
      border-radius: 7px;
      background: var(--bg-card);
      color: var(--text);
      font-family: inherit;
      font-size: .82rem;
      cursor: pointer;
      transition: all .15s;
      box-shadow: var(--shadow);
    }
    .pg-btn:hover { border-color: var(--accent); color: var(--accent); }
    .pg-btn.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .pg-btn:disabled { opacity: .3; cursor: not-allowed; box-shadow: none; }

    footer {
      text-align: center;
      padding: 2rem 1rem;
      color: var(--text-muted);
      font-size: .78rem;
    }

    @media (max-width: 700px) {
      .filters-inner { gap: .5rem; }
      .fld input, .fld select { min-width: 120px; }
      .detail-inner { grid-template-columns: 1fr 1fr; padding-left: 1rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo"><span class="logo-day">Day</span><span class="logo-d">D</span><span class="logo-i">i</span><span class="logo-ne">ne</span></div>
    <div class="tagline">UK Restaurant Tracking &amp; Ratings &mdash; 264,791 FSA establishments</div>
  </div>
</header>

<div class="filters">
  <div class="filters-inner">
    <div class="fld">
      <label for="fName">Name</label>
      <input type="text" id="fName" placeholder="Search name…">
    </div>
    <div class="fld">
      <label for="fLA">Local Authority</label>
      <input type="text" id="fLA" placeholder="e.g. Camden">
    </div>
    <div class="fld">
      <label for="fType">Business Type</label>
      <input type="text" id="fType" placeholder="e.g. 1 (Restaurant)">
    </div>
    <div class="fld">
      <label for="fRating">Rating</label>
      <select id="fRating">
        <option value="">Any</option>
        <option value="5">5 — Very good</option>
        <option value="4">4 — Good</option>
        <option value="3">3 — Generally satisfactory</option>
        <option value="2">2 — Improvement necessary</option>
        <option value="1">1 — Major improvement necessary</option>
        <option value="0">0 — Urgent improvement necessary</option>
      </select>
    </div>
    <button class="btn" id="btnSearch">Search</button>
  </div>
</div>

<main>
  <div id="status" class="status">Enter a Local Authority and press Search to query the database.</div>
  <div id="resultsWrap" style="display:none;">
    <div class="meta-bar">
      <span id="metaCount"></span>
      <span id="metaSort"></span>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th class="sortable" data-key="n">Name <span class="arrow"></span></th>
            <th>Address</th>
            <th>Postcode</th>
            <th>Local Authority</th>
            <th>Type</th>
            <th class="sortable" data-key="r">FSA Rating <span class="arrow"></span></th>
            <th class="sortable" data-key="gr">Google <span class="arrow"></span></th>
            <th class="sortable" data-key="rd">Last Inspected <span class="arrow"></span></th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
    <div class="pagination" id="pagination"></div>
  </div>
</main>

<footer>DayDine &copy; 2026 — Data sourced from the UK Food Standards Agency</footer>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>
  // ============================================================
  //  FIREBASE CONFIG — replace placeholders with your real values
  // ============================================================
  const firebaseConfig = {
    apiKey:            "AIzaSyBiFeN9DeiNnDFdu3O4uVTILnQANYsLdkA",
    authDomain:        "recursive-research-eu.firebaseapp.com",
    databaseURL:       "https://recursive-research-eu-default-rtdb.europe-west1.firebasedatabase.app",
    projectId:         "recursive-research-eu",
    storageBucket:     "recursive-research-eu.firebasestorage.app",
    messagingSenderId: "205357382117",
    appId:             "1:205357382117:web:5b01c86ed33572abce170c"
  };
  // ============================================================

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();
  const REF = db.ref("daydine/establishments");

  // Field mapping: compact DB keys → display names
  // n=name, a=address, la=local authority, pc=postcode,
  // rd=last inspection date, t=business type (numeric), r=rating, id=FSA ID, lat/lon

  const PAGE_SIZE = 50;
  let results = [];
  let page = 0;
  let sortKey = "n";
  let sortAsc = true;
  let expandedId = null;

  // Friendly sort-key labels for the meta bar
  const SORT_LABELS = { n: "name", r: "FSA rating", gr: "Google rating", rd: "last inspected" };

  // DOM
  const fName   = document.getElementById("fName");
  const fLA     = document.getElementById("fLA");
  const fType   = document.getElementById("fType");
  const fRating = document.getElementById("fRating");
  const btnSearch   = document.getElementById("btnSearch");
  const statusEl    = document.getElementById("status");
  const resultsWrap = document.getElementById("resultsWrap");
  const tbody       = document.getElementById("tbody");
  const metaCount   = document.getElementById("metaCount");
  const metaSort    = document.getElementById("metaSort");
  const pagEl       = document.getElementById("pagination");

  // ---- Events ----
  btnSearch.addEventListener("click", search);
  document.querySelectorAll(".fld input, .fld select").forEach(el => {
    el.addEventListener("keydown", e => { if (e.key === "Enter") search(); });
  });

  document.querySelectorAll("th.sortable").forEach(th => {
    th.addEventListener("click", () => {
      const key = th.dataset.key;
      if (sortKey === key) { sortAsc = !sortAsc; } else { sortKey = key; sortAsc = true; }
      applySort();
      page = 0;
      render();
      updateSortArrows();
    });
  });

  // ---- Search ----
  async function search() {
    const la     = fLA.value.trim();
    const name   = fName.value.trim().toLowerCase();
    const type   = fType.value.trim();
    const rating = fRating.value;

    if (!la) {
      showStatus("Please enter a Local Authority to narrow the query (264k records is too large to fetch at once).");
      return;
    }

    showStatus("Querying…");
    btnSearch.disabled = true;

    try {
      const snap = await REF.orderByChild("la").equalTo(la).once("value");
      const data = snap.val();

      if (!data) { results = []; }
      else {
        let entries = Object.entries(data).map(([id, d]) => ({ _id: id, ...d }));

        // Client-side filters on compact fields
        if (name)        entries = entries.filter(d => d.n && d.n.toLowerCase().includes(name));
        if (type)        entries = entries.filter(d => d.t !== undefined && String(d.t) === type);
        if (rating !== "") entries = entries.filter(d => d.r !== undefined && d.r === parseInt(rating, 10));

        results = entries;
      }

      sortKey = "n"; sortAsc = true;
      applySort();
      updateSortArrows();
      page = 0;
      expandedId = null;
      render();
    } catch (err) {
      console.error(err);
      showStatus("Error: " + err.message);
    } finally {
      btnSearch.disabled = false;
    }
  }

  // ---- Sort ----
  function applySort() {
    results.sort((a, b) => {
      let va = a[sortKey], vb = b[sortKey];
      if (sortKey === "r" || sortKey === "gr") {
        va = (typeof va === "number") ? va : -1;
        vb = (typeof vb === "number") ? vb : -1;
        return sortAsc ? va - vb : vb - va;
      }
      if (sortKey === "rd") {
        va = va ? new Date(va).getTime() : 0;
        vb = vb ? new Date(vb).getTime() : 0;
        return sortAsc ? va - vb : vb - va;
      }
      va = (va || "").toString().toLowerCase();
      vb = (vb || "").toString().toLowerCase();
      return sortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
    });
  }

  function updateSortArrows() {
    document.querySelectorAll("th.sortable").forEach(th => {
      const arrow = th.querySelector(".arrow");
      if (th.dataset.key === sortKey) {
        arrow.textContent = sortAsc ? "▲" : "▼";
      } else {
        arrow.textContent = "";
      }
    });
    metaSort.textContent = "Sorted by " + (SORT_LABELS[sortKey] || sortKey) + (sortAsc ? " ↑" : " ↓");
  }

  // ---- Format helpers ----
  function formatDate(rd) {
    if (!rd) return "—";
    const d = new Date(rd);
    if (isNaN(d.getTime())) return esc(rd);
    return d.toLocaleDateString("en-GB", { day: "numeric", month: "short", year: "numeric" });
  }

  // ---- Render ----
  function render() {
    if (results.length === 0) {
      showStatus("No establishments found. Try a different Local Authority or adjust filters.");
      return;
    }
    statusEl.style.display = "none";
    resultsWrap.style.display = "";

    const totalPages = Math.ceil(results.length / PAGE_SIZE);
    const start = page * PAGE_SIZE;
    const slice = results.slice(start, start + PAGE_SIZE);

    metaCount.textContent = results.length.toLocaleString() + " result" + (results.length !== 1 ? "s" : "")
      + " — page " + (page + 1) + " of " + totalPages;

    tbody.innerHTML = "";
    slice.forEach(d => {
      // Main row
      const tr = document.createElement("tr");
      if (d._id === expandedId) tr.classList.add("expanded-parent");
      tr.innerHTML =
        '<td class="name-cell">' + esc(d.n || "—") + '</td>' +
        '<td>' + esc(d.a || "—") + '</td>' +
        '<td>' + esc(d.pc || "—") + '</td>' +
        '<td>' + esc(d.la || "—") + '</td>' +
        '<td>' + esc(d.t !== undefined ? String(d.t) : "—") + '</td>' +
        '<td>' + ratingHTML(d.r) + '</td>' +
        '<td>' + googleRatingHTML(d.gr, d.grc) + '</td>' +
        '<td>' + formatDate(d.rd) + '</td>';
      tr.querySelector(".name-cell").addEventListener("click", () => toggleExpand(d._id));
      tbody.appendChild(tr);

      // Detail row
      if (d._id === expandedId) {
        const dr = document.createElement("tr");
        dr.className = "detail-row";
        const td = document.createElement("td");
        td.colSpan = 8;
        td.innerHTML = buildDetail(d);
        dr.appendChild(td);
        tbody.appendChild(dr);
      }
    });

    // Pagination
    pagEl.innerHTML = "";
    if (totalPages > 1) {
      pgBtn("« Prev", page > 0, () => { page--; render(); scrollTop(); });
      let s = Math.max(0, page - 3), e = Math.min(totalPages, s + 7);
      if (e - s < 7) s = Math.max(0, e - 7);
      for (let i = s; i < e; i++) {
        pgBtn(i + 1, true, () => { page = i; render(); scrollTop(); }, i === page);
      }
      pgBtn("Next »", page < totalPages - 1, () => { page++; render(); scrollTop(); });
    }
  }

  function toggleExpand(id) {
    expandedId = (expandedId === id) ? null : id;
    render();
  }

  function buildDetail(d) {
    let html = '<div class="detail-inner">' +
      dlBlock("Full Address", (d.a || "") + (d.pc ? ", " + d.pc : "")) +
      dlBlock("Local Authority", d.la) +
      dlBlock("Business Type", d.t !== undefined ? String(d.t) : "—") +
      dlBlock("FSA ID", d.id) +
      dlBlock("Last Inspection", formatDate(d.rd)) +
      dlBlock("Coordinates", (d.lat && d.lon) ? d.lat + ", " + d.lon : "—");

    // Google Places fields (if enriched)
    if (d.gid) {
      if (d.gr !== undefined) html += dlBlock("Google Rating", d.gr + " / 5.0");
      if (d.grc !== undefined) html += dlBlock("Google Reviews", d.grc.toLocaleString());
      if (d.gpl) html += dlBlock("Price Level", d.gpl.replace("PRICE_LEVEL_", ""));
      if (d.gt && d.gt.length) html += dlBlock("Google Types", d.gt.join(", "));
      if (d.goh && d.goh.length) html += dlBlock("Opening Hours", d.goh.join(" | "));
    }

    html += '</div>';
    return html;
  }

  function dlBlock(label, val) {
    return '<div><div class="dl-label">' + esc(label) + '</div><div class="dl-val">' + esc(val || "—") + '</div></div>';
  }

  function googleRatingHTML(gr, grc) {
    if (gr === undefined || gr === null) return '<span style="color:var(--text-muted);font-size:.78rem">—</span>';
    const count = (grc !== undefined && grc !== null) ? '&nbsp;<span class="google-count">(' + Number(grc).toLocaleString() + ')</span>' : '';
    return '<span class="google-rating"><span class="google-star">&#9733;</span><span class="google-score">' + Number(gr).toFixed(1) + '</span>' + count + '</span>';
  }

  function ratingHTML(r) {
    if (r === null || r === undefined || r === "Exempt")
      return '<span class="rating r-exempt">Exempt</span>';
    const n = parseInt(r, 10);
    if (isNaN(n)) return '<span class="rating r-exempt">' + esc(String(r)) + '</span>';
    return '<span class="rating r' + n + '">' + n + '</span>';
  }

  function pgBtn(label, enabled, fn, active) {
    const b = document.createElement("button");
    b.className = "pg-btn" + (active ? " active" : "");
    b.textContent = label;
    b.disabled = !enabled;
    if (enabled) b.addEventListener("click", fn);
    pagEl.appendChild(b);
  }

  function showStatus(msg) {
    resultsWrap.style.display = "none";
    statusEl.style.display = "";
    statusEl.textContent = msg;
  }

  function scrollTop() { window.scrollTo({ top: 0, behavior: "smooth" }); }

  function esc(s) {
    const el = document.createElement("span");
    el.textContent = s;
    return el.innerHTML;
  }
</script>
</body>
</html>
