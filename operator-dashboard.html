<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow">
  <title>Operator Dashboard — DayDine</title>
  <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@400;500;600;700;800&family=Newsreader:ital,wght@0,500;0,700;1,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/daydine.css">
  <style>
    main{max-width:1320px;margin:0 auto;padding:38px 24px 90px}.hero{display:grid;grid-template-columns:1.2fr .8fr;gap:20px;align-items:end}.title{font-family:var(--serif);font-size:clamp(42px,6vw,82px);line-height:.94;margin:8px 0 12px}.dek{max-width:820px;color:var(--text-muted);font-size:17px;line-height:1.6}.panel{background:var(--surface-1);border:1px solid var(--border);box-shadow:var(--shadow);padding:20px}.score-card{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.score{background:var(--surface-2);border:1px solid var(--border);padding:16px}.score b{display:block;font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.09em;color:var(--text-subtle);margin-bottom:7px}.score span{font-family:var(--serif);font-size:38px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:18px}.wide{grid-column:1/-1}.section-title{font-family:var(--serif);font-size:34px;line-height:1;margin:0 0 12px}.cards{display:grid;gap:10px}.mini{border:1px solid var(--border-soft);background:rgba(255,255,255,.22);padding:13px}.mini h3{margin:0 0 6px;font-size:16px}.muted{color:var(--text-muted);line-height:1.5}.pills{display:flex;gap:7px;flex-wrap:wrap;margin:12px 0}.pill{display:inline-flex;padding:5px 8px;border:1px solid var(--border);border-radius:999px;background:var(--surface-2);font-size:12px;font-weight:700;color:var(--accent)}table{width:100%;border-collapse:collapse;font-size:14px}th,td{text-align:left;border-bottom:1px solid var(--border-soft);padding:9px 7px}th{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--text-subtle)}.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px}.btn{display:inline-flex;align-items:center;justify-content:center;padding:11px 14px;border:1px solid var(--accent-dark);border-radius:var(--radius);text-decoration:none;background:linear-gradient(135deg,var(--accent),var(--accent-hover));font-weight:800;color:var(--text)}.btn.secondary{background:var(--surface-1);border-color:var(--border);color:var(--accent)}.priority{border-left:4px solid var(--accent);padding-left:14px}.empty{max-width:760px;margin:60px auto;padding:24px;background:var(--surface-1);border:1px solid var(--border)}@media(max-width:900px){.hero,.grid{grid-template-columns:1fr}.score-card{grid-template-columns:1fr 1fr}.title{font-size:46px}}@media(max-width:560px){.score-card{grid-template-columns:1fr}}
  </style>
</head>
<body class="ed" data-page-type="operator">
<header class="masthead"><div class="masthead-inner"><a class="wordmark" href="/">Day<em>dine</em></a><div class="mast-issue">Operator · <b>Dashboard</b></div><nav class="mast-nav"><a href="/">Home</a><a href="/rankings">Rankings</a><a href="/search">Search</a><a href="/admin/reports">Reports</a></nav></div></header>
<main id="app"><section class="empty">Loading operator dashboard…</section></main>
<script>
const $=s=>document.querySelector(s);function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function param(name){return new URLSearchParams(location.search).get(name);}function venueFromPath(){const parts=location.pathname.split('/').filter(Boolean);if(parts[0]==='operator'&&parts[1])return parts[1];return param('venue')||'lambs';}
async function fetchJson(url){const res=await fetch(url,{cache:'no-store'});if(!res.ok)throw new Error(url+' '+res.status);return res.json();}
function score(label,value){return `<div class="score"><b>${esc(label)}</b><span>${esc(value)}</span></div>`;}
function table(rows,cols){return `<table><thead><tr>${cols.map(c=>`<th>${esc(c.label)}</th>`).join('')}</tr></thead><tbody>${rows.map(r=>`<tr>${cols.map(c=>`<td>${esc(r[c.key])}</td>`).join('')}</tr>`).join('')}</tbody></table>`;}
function render(data){document.title=data.venue+' Operator Dashboard — DayDine';$('#app').innerHTML=`<section class="hero"><div><div class="kicker kicker-accent">${esc(data.month)} operator screen</div><h1 class="title">${esc(data.venue)}</h1><p class="dek">${esc(data.headline.tracking_status)} This screen is the live client product layer; the report remains available as a download/export.</p><div class="pills"><span class="pill">${esc(data.market)}</span><span class="pill">${esc(data.category)}</span><span class="pill">${esc(data.status)}</span><span class="pill">${esc(data.scores.confidence_class)}</span></div><div class="actions"><a class="btn" href="${esc(data.download_report_url)}" target="_blank" rel="noopener">Download / open report</a><a class="btn secondary" href="/admin/reports">Back to report library</a></div></div><div class="panel score-card">${score('Overall rank','#'+data.headline.overall_rank+' / '+data.headline.overall_total)}${score('Category rank','#'+data.headline.category_rank+' / '+data.headline.category_total)}${score('DayDine RCS',data.scores.public_rcs)}${score('Operator score',data.scores.operator_v4_score)}</div></section><section class="grid"><article class="panel"><h2 class="section-title">Monthly tracking</h2>${table(data.monthly_tracking,[{key:'label',label:'Metric'},{key:'value',label:'Current'},{key:'meaning',label:'Meaning'}])}</article><article class="panel"><h2 class="section-title">Commercial impact</h2><div class="cards"><div class="mini"><h3>${esc(data.commercial_impact.monthly_revenue_impact)} monthly</h3><p class="muted">${esc(data.commercial_impact.wording_guardrail)}</p></div><div class="mini"><h3>${esc(data.commercial_impact.annual_projection)} annual projection</h3><p class="muted">Cost band ${esc(data.commercial_impact.cost_band)} · payback ${esc(data.commercial_impact.payback_window)}</p></div></div></article><article class="panel wide"><h2 class="section-title">Action priorities</h2><div class="cards">${data.priorities.map((p,i)=>`<div class="mini priority"><h3>${i+1}. ${esc(p.title)}</h3><p class="muted"><b>${esc(p.target)}</b> — ${esc(p.why)}</p><p class="muted"><b>Action:</b> ${esc(p.action)}</p><p class="muted"><b>Expected upside:</b> ${esc(p.expected_upside)}</p></div>`).join('')}</div></article><article class="panel"><h2 class="section-title">Nearest competitors</h2>${table(data.nearest_competitors,[{key:'rank',label:'Rank'},{key:'venue',label:'Venue'},{key:'category',label:'Category'},{key:'rcs',label:'RCS'},{key:'gap',label:'Gap'}])}</article><article class="panel"><h2 class="section-title">Score components</h2><div class="cards">${data.components.map(c=>`<div class="mini"><h3>${esc(c.name)} · ${esc(c.score)}</h3><p class="muted">${esc(c.summary)}</p><p class="muted">${esc(c.evidence)}</p></div>`).join('')}</div></article><article class="panel wide"><h2 class="section-title">Watch list & evidence</h2><div class="grid" style="margin-top:0"><div><div class="cards">${data.watch_list.map(w=>`<div class="mini">${esc(w)}</div>`).join('')}</div></div><div>${table(Object.keys(data.evidence).map(k=>({field:k.replaceAll('_',' '),value:data.evidence[k]})),[{key:'field',label:'Evidence field'},{key:'value',label:'Value'}])}</div></div></article></section>`;}
async function init(){try{const venue=venueFromPath();const manifest=await fetchJson('/assets/operator-dashboards/manifest.json');const item=(manifest.dashboards||[]).find(d=>d.venue_slug===venue)||manifest.dashboards[0];if(!item)throw new Error('No dashboards configured');const data=await fetchJson(item.snapshot_url);render(data);}catch(e){console.error(e);$('#app').innerHTML='<section class="empty"><h1>Dashboard unavailable</h1><p>Could not load the operator dashboard snapshot.</p></section>';}}
init();
</script>
</body>
</html>
