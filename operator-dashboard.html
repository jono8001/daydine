<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow">
  <title>Operator Dashboard — DayDine</title>
  <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@400;500;600;700;800&family=Newsreader:ital,wght@0,500;0,700;1,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/daydine.css">
  <style>
    main{max-width:1320px;margin:0 auto;padding:38px 24px 90px}.hero{display:grid;grid-template-columns:1.2fr .8fr;gap:20px;align-items:end}.title{font-family:var(--serif);font-size:clamp(42px,6vw,82px);line-height:.94;margin:8px 0 12px}.dek{max-width:820px;color:var(--text-muted);font-size:17px;line-height:1.6}.panel{background:var(--surface-1);border:1px solid var(--border);box-shadow:var(--shadow);padding:20px}.score-card{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.score{background:var(--surface-2);border:1px solid var(--border);padding:16px}.score b{display:block;font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.09em;color:var(--text-subtle);margin-bottom:7px}.score span{font-family:var(--serif);font-size:38px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:18px}.wide{grid-column:1/-1}.section-title{font-family:var(--serif);font-size:34px;line-height:1;margin:0 0 12px}.cards{display:grid;gap:10px}.mini{border:1px solid var(--border-soft);background:rgba(255,255,255,.22);padding:13px}.mini h3{margin:0 0 6px;font-size:16px}.muted{color:var(--text-muted);line-height:1.5}.pills{display:flex;gap:7px;flex-wrap:wrap;margin:12px 0}.pill{display:inline-flex;padding:5px 8px;border:1px solid var(--border);border-radius:999px;background:var(--surface-2);font-size:12px;font-weight:700;color:var(--accent)}table{width:100%;border-collapse:collapse;font-size:14px}th,td{text-align:left;border-bottom:1px solid var(--border-soft);padding:9px 7px}th{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--text-subtle)}.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px}.btn{display:inline-flex;align-items:center;justify-content:center;padding:11px 14px;border:1px solid var(--accent-dark);border-radius:var(--radius);text-decoration:none;background:linear-gradient(135deg,var(--accent),var(--accent-hover));font-weight:800;color:var(--text)}.btn.secondary{background:var(--surface-1);border-color:var(--border);color:var(--accent)}.priority{border-left:4px solid var(--accent);padding-left:14px}.empty{max-width:760px;margin:60px auto;padding:24px;background:var(--surface-1);border:1px solid var(--border)}.movement-summary{font-size:20px;font-weight:800;color:var(--text);margin:0 0 12px}.timeline{display:grid;gap:8px;margin-top:12px}.timeline-row{display:grid;grid-template-columns:110px repeat(4,1fr);gap:10px;align-items:center;border:1px solid var(--border-soft);background:rgba(255,255,255,.22);padding:10px}.timeline-row b{font-family:var(--mono);font-size:12px;color:var(--accent)}.sparkline{font-family:var(--mono);letter-spacing:-2px;font-size:22px;color:var(--accent);white-space:nowrap}.intelligence-copy{font-size:18px;line-height:1.6;color:var(--text-muted);max-width:940px}.intelligence-copy strong{color:var(--text)}.context-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.context{border:1px solid var(--border-soft);background:rgba(255,255,255,.22);padding:16px}.context h3{margin:0 0 8px;font-size:19px}.context .big{font-family:var(--serif);font-size:42px;line-height:1;margin:10px 0}.context .label{font-family:var(--mono);font-size:10px;letter-spacing:.09em;text-transform:uppercase;color:var(--text-subtle)}@media(max-width:900px){.hero,.grid,.context-grid{grid-template-columns:1fr}.score-card{grid-template-columns:1fr 1fr}.title{font-size:46px}.timeline-row{grid-template-columns:1fr 1fr}}@media(max-width:560px){.score-card{grid-template-columns:1fr}.timeline-row{grid-template-columns:1fr}}
  </style>
</head>
<body class="ed" data-page-type="operator">
<header class="masthead"><div class="masthead-inner"><a class="wordmark" href="/">Day<em>dine</em></a><div class="mast-issue">Operator · <b>Dashboard</b></div><nav class="mast-nav"><a href="/">Home</a><a href="/rankings">Rankings</a><a href="/search">Search</a><a href="/admin/reports">Reports</a></nav></div></header>
<main id="app"><section class="empty">Loading operator dashboard…</section></main>
<script>
const $=s=>document.querySelector(s);function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function param(name){return new URLSearchParams(location.search).get(name);}function venueFromPath(){const parts=location.pathname.split('/').filter(Boolean);if(parts[0]==='operator'&&parts[1])return parts[1];return param('venue')||'lambs';}
async function fetchJson(url){const res=await fetch(url,{cache:'no-store'});if(!res.ok)throw new Error(url+' '+res.status);return res.json();}
function score(label,value){return `<div class="score"><b>${esc(label)}</b><span>${esc(value==null?'—':value)}</span></div>`;}
function table(rows,cols){return `<table><thead><tr>${cols.map(c=>`<th>${esc(c.label)}</th>`).join('')}</tr></thead><tbody>${rows.map(r=>`<tr>${cols.map(c=>`<td>${esc(r[c.key])}</td>`).join('')}</tr>`).join('')}</tbody></table>`;}
function movementText(v,type){if(v==null)return '—';if(type==='rank'){if(v>0)return '▲ '+v;if(v<0)return '▼ '+Math.abs(v);return '—';}if(Number(v)>0)return '+'+v;return String(v);}function spark(history,key){const vals=(history||[]).map(h=>Number(h[key])).filter(v=>Number.isFinite(v));if(vals.length<2)return '▂▂▂';const min=Math.min(...vals),max=Math.max(...vals);const chars='▁▂▃▄▅▆▇';return vals.map(v=>chars[Math.round(((v-min)/(max-min||1))*(chars.length-1))]).join('');}
function historyBlock(data){const h=data.history||[];const m=data.movement||{};return `<article class="panel wide"><h2 class="section-title">Movement over time</h2><p class="movement-summary">${esc(m.summary||'Baseline month — movement will appear after the next monthly snapshot.')}</p><div class="score-card">${score('Overall rank movement',movementText(m.overall_rank_delta,'rank'))}${score('Category rank movement',movementText(m.category_rank_delta,'rank'))}${score('RCS movement',movementText(m.public_rcs_delta,'score'))}${score('Review-count movement',movementText(m.review_count_delta,'score'))}</div><div class="timeline"><div class="timeline-row"><b>Trend</b><span>Rank <span class="sparkline">${esc(spark(h,'overall_rank'))}</span></span><span>Category <span class="sparkline">${esc(spark(h,'category_rank'))}</span></span><span>RCS <span class="sparkline">${esc(spark(h,'public_rcs'))}</span></span><span>Reviews <span class="sparkline">${esc(spark(h,'google_review_count'))}</span></span></div>${h.map(row=>`<div class="timeline-row"><b>${esc(row.month)}</b><span>Overall #${esc(row.overall_rank)}</span><span>Category #${esc(row.category_rank)}</span><span>RCS ${esc(row.public_rcs)}</span><span>Reviews ${esc(row.google_review_count==null?'—':row.google_review_count)}</span></div>`).join('')}</div></article>`;}
function contextsBlock(data){const op=data.operator_context, pub=data.public_context;if(!op&&!pub)return '';const card=c=>`<div class="context"><div class="label">${esc(c.label||'Context')}</div><h3>${esc(c.market||'Market view')}</h3><div class="big">#${esc(c.overall_rank)} / ${esc(c.overall_total)}</div><p class="muted">${c.category_rank!=null?`Category #${esc(c.category_rank)} / ${esc(c.category_total)} ${esc(c.category_label||'')}`:'Category movement unavailable in this view.'}</p><p class="muted">${esc(c.visibility||'')}</p><p class="muted"><small>${esc(c.note||'')}</small></p></div>`;return `<article class="panel wide"><h2 class="section-title">Two views of your position</h2><div class="context-grid">${op?card(op):''}${pub?card(pub):''}</div></article>`;}
function intelligenceBlock(data){return `<article class="panel wide"><h2 class="section-title">Monthly intelligence layer</h2><p class="intelligence-copy"><strong>DayDine monitors public market signals, ranking movement, visibility changes and competitive positioning each month.</strong> The headline movements and recommended actions are shown above. We keep the underlying evidence and scoring rules transparent without turning the client screen into a checklist of every monitored signal.</p>${data.final_takeaway?`<p class="intelligence-copy"><strong>Operator takeaway:</strong> ${esc(data.final_takeaway)}</p>`:''}<div class="actions"><a class="btn secondary" href="/methodology" target="_blank" rel="noopener">View methodology</a>${data.download_report_url?`<a class="btn secondary" href="${esc(data.download_report_url)}" target="_blank" rel="noopener">Open detailed report/export</a>`:''}</div></article>`;}
function dontDoBlock(data){const items=data.what_not_to_do||[];if(!items.length)return '';return `<article class="panel wide"><h2 class="section-title">What not to do this month</h2><div class="cards">${items.map(x=>`<div class="mini">${esc(x)}</div>`).join('')}</div></article>`;}
function render(data){document.title=data.venue+' Operator Dashboard — DayDine';$('#app').innerHTML=`<section class="hero"><div><div class="kicker kicker-accent">${esc(data.month)} operator screen</div><h1 class="title">${esc(data.venue)}</h1><p class="dek">${esc(data.headline.tracking_status)} This screen is the live client product layer; every monthly snapshot is retained so movement can be monitored over time.</p><div class="pills"><span class="pill">${esc(data.market)}</span><span class="pill">${esc(data.category)}</span><span class="pill">${esc(data.status)}</span><span class="pill">${esc(data.client_status||'draft')}</span><span class="pill">${esc(data.scores.confidence_class)}</span>${data.report_aligned?'<span class="pill">Report-aligned</span>':''}</div><div class="actions"><a class="btn" href="${esc(data.download_report_url||'#')}" target="_blank" rel="noopener">Download / open report</a><a class="btn secondary" href="/admin/reports">Back to report library</a></div></div><div class="panel score-card">${score('Operator rank','#'+data.headline.overall_rank+' / '+data.headline.overall_total)}${score('Category rank','#'+data.headline.category_rank+' / '+(data.headline.category_total||'—'))}${score('Public RCS',data.scores.public_rcs)}${score('Operator score',data.scores.operator_v4_score)}</div></section><section class="grid">${contextsBlock(data)}${historyBlock(data)}<article class="panel"><h2 class="section-title">Monthly tracking</h2>${table(data.monthly_tracking,[{key:'label',label:'Metric'},{key:'value',label:'Current'},{key:'meaning',label:'Meaning'}])}</article><article class="panel"><h2 class="section-title">Commercial impact</h2><div class="cards"><div class="mini"><h3>${esc(data.commercial_impact.monthly_revenue_impact)} monthly</h3><p class="muted">${esc(data.commercial_impact.wording_guardrail)}</p></div><div class="mini"><h3>${esc(data.commercial_impact.annual_projection)} annual projection</h3><p class="muted">Cost band ${esc(data.commercial_impact.cost_band)} · payback ${esc(data.commercial_impact.payback_window)}</p></div>${data.commercial_readiness_gap?`<div class="mini"><h3>Observed gap</h3><p class="muted">${esc(data.commercial_readiness_gap)}</p></div>`:''}</div></article><article class="panel wide"><h2 class="section-title">Action priorities</h2><div class="cards">${(data.priorities||[]).map((p,i)=>`<div class="mini priority"><h3>${i+1}. ${esc(p.title)}</h3><p class="muted"><b>${esc(p.target)}</b> — ${esc(p.why)}</p>${p.evidence?`<p class="muted"><b>Evidence:</b> ${esc(p.evidence)}</p>`:''}<p class="muted"><b>Action:</b> ${esc(p.action)}</p><p class="muted"><b>Expected upside:</b> ${esc(p.expected_upside)}</p>${p.next_milestone?`<p class="muted"><b>Next milestone:</b> ${esc(p.next_milestone)}</p>`:''}</div>`).join('')}</div></article><article class="panel"><h2 class="section-title">Nearest competitors</h2>${table(data.nearest_competitors,[{key:'rank',label:'Rank'},{key:'venue',label:'Venue'},{key:'category',label:'Category'},{key:'rcs',label:'RCS'},{key:'gap',label:'Gap'}])}</article><article class="panel"><h2 class="section-title">Why this score matters</h2><div class="cards">${(data.components||[]).map(c=>`<div class="mini"><h3>${esc(c.name)} · ${esc(c.score)}</h3><p class="muted">${esc(c.summary)}</p><p class="muted">${esc(c.evidence)}</p></div>`).join('')}</div></article>${dontDoBlock(data)}${intelligenceBlock(data)}</section>`;}
async function init(){try{const venue=venueFromPath();const manifest=await fetchJson('/assets/operator-dashboards/manifest.json');const item=(manifest.dashboards||[]).find(d=>d.venue_slug===venue)||manifest.dashboards[0];if(!item)throw new Error('No dashboards configured');const data=await fetchJson(item.latest_url||item.snapshot_url);render(data);}catch(e){console.error(e);$('#app').innerHTML='<section class="empty"><h1>Dashboard unavailable</h1><p>Could not load the operator dashboard snapshot.</p></section>';}}
init();
</script>
</body>
</html>
