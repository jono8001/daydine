<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow">
  <title>Client Portal — DayDine</title>
  <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@400;500;600;700;800&family=Newsreader:ital,wght@0,500;0,700;1,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/daydine.css">
  <style>
    main{max-width:1220px;margin:0 auto;padding:42px 24px 90px}.title{font-family:var(--serif);font-size:clamp(42px,6vw,78px);line-height:.96;margin:8px 0 12px}.dek{max-width:840px;color:var(--text-muted);font-size:17px;line-height:1.6}.panel{margin-top:24px;background:var(--surface-1);border:1px solid var(--border);box-shadow:var(--shadow);padding:20px}.cards{margin-top:22px;display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px}.card{background:var(--surface-1);border:1px solid var(--border);box-shadow:var(--shadow-xs);padding:18px}.name{font-family:var(--serif);font-size:30px;line-height:1.05;margin-bottom:8px}.sub{color:var(--text-muted);line-height:1.5}.pills{display:flex;gap:6px;flex-wrap:wrap;margin-top:12px}.pill{display:inline-flex;padding:5px 8px;border:1px solid var(--border);border-radius:999px;background:var(--surface-2);font-size:12px;font-weight:700;color:var(--accent)}.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px}.btn,button{display:inline-flex;align-items:center;justify-content:center;padding:11px 14px;border:1px solid var(--accent-dark);border-radius:var(--radius);text-decoration:none;background:linear-gradient(135deg,var(--accent),var(--accent-hover));font-weight:800;color:var(--text);cursor:pointer}.btn.secondary,button.secondary{background:var(--surface-1);border-color:var(--border);color:var(--accent)}.empty{max-width:820px;margin:36px 0;padding:22px;background:var(--surface-1);border:1px solid var(--border);box-shadow:var(--shadow-xs);color:var(--text-muted);line-height:1.55}.note{margin-top:18px;border:1px solid var(--border);background:var(--surface-2);padding:14px;color:var(--text-muted);line-height:1.45}.metric-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:10px;margin-top:18px}.metric{border:1px solid var(--border);background:var(--surface-2);padding:14px}.metric b{display:block;font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.09em;color:var(--text-subtle);margin-bottom:6px}.metric span{font-family:var(--serif);font-size:30px}@media(max-width:720px){.title{font-size:44px}}
  </style>
</head>
<body class="ed" data-page-type="client">
<header class="masthead"><div class="masthead-inner"><a class="wordmark" href="/">Day<em>dine</em></a><div class="mast-issue">Client · <b>Protected portal</b></div><nav class="mast-nav"><a href="/rankings">Rankings</a><a href="/methodology">Methodology</a><a href="/admin" id="adminNav" style="display:none">Admin</a><button class="secondary" id="logoutBtn" type="button">Logout</button></nav></div></header>
<main id="app"><section class="empty">Checking secure access…</section></main>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="/assets/daydine-firebase.js"></script>
<script src="/assets/daydine-auth.js"></script>
<script>
const app=document.getElementById('app');
function esc(s){return DayDineAuth.esc(s);}
function venueCard(v){
  const status=v.status||'active';
  const signal=v.daydineSignal||v.daydine_signal||'Monthly intelligence';
  const confidence=v.evidenceConfidence||v.evidence_confidence||v.confidenceClass||'Protected snapshot';
  return `<article class="card"><div class="name">${esc(v.publicName||v.canonicalName||v.id)}</div><div class="sub">${esc(v.marketName||v.marketSlug||'Market')} · ${esc(v.category||'Venue')}<br>${esc(v.address||'')}</div><div class="pills"><span class="pill">${esc(status)}</span><span class="pill">${esc(confidence)}</span><span class="pill">${esc(signal)}</span></div><div class="actions"><a class="btn" href="/client/venues/${encodeURIComponent(v.id)}">Open dashboard</a></div></article>`;
}
function render(profile, venues){
  document.getElementById('adminNav').style.display=DayDineAuth.role(profile)==='admin'?'inline-flex':'none';
  const cards=venues.map(venueCard).join('');
  app.innerHTML=`<section><div class="kicker kicker-accent">Protected client portal</div><h1 class="title">Your DayDine dashboards.</h1><p class="dek">Authenticated users can only see venues assigned to their DayDine profile. Admin users can see all seeded venues. Dashboard snapshots are read from Firebase under <code>daydine_saas</code>, not from public operator JSON.</p><div class="metric-row"><div class="metric"><b>Signed in as</b><span>${esc(profile.email)}</span></div><div class="metric"><b>Role</b><span>${esc(profile.role)}</span></div><div class="metric"><b>Assigned venues</b><span>${venues.length}</span></div></div>${venues.length?`<div class="cards">${cards}</div>`:`<section class="empty"><h2>No venues assigned yet</h2><p>Add venue IDs to <code>daydine_saas/users/${esc(profile.uid)}/venueIds</code>, or seed the first client fixture using <code>data/firebase_daydine_saas_seed_lambs.json</code>.</p></section>`}<div class="note"><b>Framework-first build:</b> this portal is venue-agnostic. Lambs can be the first fixture, but adding another venue should only require Firebase data/config, not bespoke page code.</div></section>`;
}
async function init(){
  const session=await DayDineAuth.requireAuth({roles:['admin','client','viewer'],target:'#app'});
  document.getElementById('logoutBtn').addEventListener('click',DayDineAuth.signOut);
  try{
    const venues=await DayDineAuth.readVenues(session.profile);
    render(session.profile,venues);
  }catch(err){
    console.error(err);
    app.innerHTML=`<section class="empty"><h1>Could not load dashboards</h1><p>${esc(err.message||'Firebase read failed.')}</p><p>Check Realtime Database rules and seed data under <code>daydine_saas</code>.</p></section>`;
  }
}
init();
</script>
</body>
</html>
