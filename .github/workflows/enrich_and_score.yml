name: Enrich Stratford with Google Places & Score

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  enrich-and-score:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch establishments from Firebase
        run: python .github/scripts/fetch_firebase_stratford.py

      - name: Enrich with Google Places API
        env:
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
        run: python .github/scripts/enrich_google_stratford.py

      - name: Merge enrichment into establishments data
        run: python .github/scripts/merge_enrichment.py

      - name: Run RCS V2 scoring pipeline
        run: python rcs_scoring_stratford.py --from-cache

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Stage ALL changes (not just named files) — pipeline may produce
          # extra files that would block rebase if left unstaged
          git add -A

          # Exit cleanly if nothing changed
          git diff --cached --quiet && echo "No changes to commit" && exit 0

          # Pull latest main BEFORE committing to avoid rebase conflicts
          # with unstaged changes (the root cause of exit code 128)
          git stash
          git pull --rebase origin main
          git stash pop || true

          # Re-stage after pull (stash pop may have introduced merge markers)
          git add -A
          git diff --cached --quiet && echo "No changes after pull" && exit 0

          git commit -m "Enrich Stratford with Google Places data and re-score RCS"
          git push
