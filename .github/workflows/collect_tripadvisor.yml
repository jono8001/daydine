name: Collect TripAdvisor Data & Score

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect-and-score:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Inspect cache before fetch
        run: |
          if [ -f stratford_establishments.json ]; then
            python - <<'PY'
          import json
          with open("stratford_establishments.json", "r", encoding="utf-8") as f:
              d = json.load(f)
          print(f"Pre-fetch cache rows: {len(d) if isinstance(d, dict) else 'n/a'}")
          PY
          else
            echo "Pre-fetch cache: (absent)"
          fi

      - name: Fetch establishments from Firebase
        run: python .github/scripts/fetch_firebase_stratford.py

      - name: Inspect cache after fetch
        run: |
          python - <<'PY'
          import json, sys
          with open("stratford_establishments.json", "r", encoding="utf-8") as f:
              d = json.load(f)
          n = len(d) if isinstance(d, dict) else 0
          print(f"Post-fetch cache rows: {n}")
          if n == 0:
              print("::error::Post-fetch cache is empty. Aborting before TripAdvisor.")
              sys.exit(5)
          PY

      - name: Merge existing Google enrichment
        run: python .github/scripts/merge_enrichment.py

      - name: Collect TripAdvisor data
        run: python .github/scripts/collect_tripadvisor.py

      - name: Inspect TripAdvisor side file
        run: |
          python - <<'PY'
          import json, os, sys
          p = "stratford_tripadvisor.json"
          if not os.path.exists(p):
              print("TripAdvisor side file absent after collect step.")
              sys.exit(0)
          with open(p, encoding="utf-8") as f:
              d = json.load(f)
          real = {k: v for k, v in d.items()
                  if not k.startswith("_") and isinstance(v, dict)}
          matched = sum(1 for v in real.values()
                        if v.get("ta") is not None and not v.get("_skipped")
                        and not v.get("_no_match") and not v.get("_error")
                        and not v.get("_blocked"))
          no_match = sum(1 for v in real.values() if v.get("_no_match"))
          blocked = sum(1 for v in real.values() if v.get("_blocked"))
          errors = sum(1 for v in real.values() if v.get("_error"))
          skipped = sum(1 for v in real.values() if v.get("_skipped"))
          print(f"TripAdvisor side file: {len(real)} fhrsid entries "
                f"(+ {len(d) - len(real)} metadata keys)")
          print(f"  matched: {matched}")
          print(f"  no_match: {no_match}")
          print(f"  blocked (HTTP 403/429): {blocked}")
          print(f"  errors: {errors}")
          print(f"  skipped: {skipped}")
          # If the collect step exited 7 this job has already failed;
          # the extra signal here catches the case where collect exited 0
          # but the dataset is dominated by blocks (shouldn't happen with
          # the current guard, but surfaces the state clearly if it does).
          attempts = matched + no_match + blocked + errors
          if attempts >= 20 and blocked / max(attempts, 1) >= 0.5:
              print(f"::error::TripAdvisor collection dominated by blocks "
                    f"({blocked}/{attempts}). Runner IP is on TA's block list. "
                    "See docs/DayDine-TripAdvisor-Blocker-Diagnosis.md.")
              sys.exit(7)
          PY

      - name: Merge TripAdvisor data
        run: python .github/scripts/merge_tripadvisor.py

      - name: Inspect cache after TA merge
        run: |
          python - <<'PY'
          import json, sys
          with open("stratford_establishments.json", "r", encoding="utf-8") as f:
              d = json.load(f)
          n = len(d) if isinstance(d, dict) else 0
          with_ta = sum(1 for v in d.values()
                        if isinstance(v, dict) and v.get("ta_present"))
          print(f"Post-TA-merge cache rows: {n} (with ta_present: {with_ta})")
          if n == 0:
              print("::error::Post-TA-merge cache is empty. Aborting before scoring.")
              sys.exit(6)
          PY

      - name: Run RCS V2 scoring pipeline
        run: python rcs_scoring_stratford.py --from-cache

      - name: Inspect scoring outputs
        run: |
          python - <<'PY'
          import csv, json, os
          if os.path.exists("stratford_rcs_scores.csv"):
              with open("stratford_rcs_scores.csv", encoding="utf-8") as f:
                  rows = list(csv.DictReader(f))
              print(f"Scoring CSV rows: {len(rows)}")
          if os.path.exists("stratford_rcs_summary.json"):
              with open("stratford_rcs_summary.json", encoding="utf-8") as f:
                  s = json.load(f)
              print(f"Summary: count={s.get('count')} ranked={s.get('ranked')} "
                    f"mean={s.get('mean')} median={s.get('median')}")
          PY

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git stash
          git pull --rebase origin main
          git stash pop || true
          git add -A
          git diff --cached --quiet && echo "No changes after pull" && exit 0
          git commit -m "Collect TripAdvisor data and re-score RCS"
          git push
