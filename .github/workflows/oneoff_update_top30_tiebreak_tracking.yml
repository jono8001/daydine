name: One-off Top 30 Tie-break Tracking Update

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/oneoff_update_top30_tiebreak_tracking.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-top30-tiebreak:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Patch public ranker and tracking generators
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          # --- Patch scripts/build_rankings_v4.py -------------------------
          p = Path('scripts/build_rankings_v4.py')
          text = p.read_text(encoding='utf-8')
          text = text.replace('public pages show top 10 overall and top 3 by category;', 'public pages show top 30 overall and up to top 30 by category;')
          if 'sys.path.insert(0, str(ROOT))' not in text:
              text = text.replace('ROOT = Path(__file__).resolve().parent.parent\n', 'ROOT = Path(__file__).resolve().parent.parent\nimport sys\nsys.path.insert(0, str(ROOT))\n')
          if 'from operator_intelligence.ranking_tiebreaker import' not in text:
              text = text.replace('from typing import Any\n', 'from typing import Any\n\nfrom operator_intelligence.ranking_tiebreaker import (\n    sort_key as rcs_sort_key,\n    tiebreak_values,\n    explanation_for_venue,\n)\n')
          text = text.replace('def build_category_rankings(venues: list[dict[str, Any]], per_category: int = 3)', 'def build_category_rankings(venues: list[dict[str, Any]], per_category: int = 30)')
          text = text.replace('"""Return compact top lists for each diner-facing category."""', '"""Return public category lists, capped at 30 venues per category."""')
          if 'def venue_sort_key(' not in text:
              insert_after = 'def movement(name: str, rank: int, old: dict[str, int]) -> tuple[str, int]:\n'
              helper = '''def venue_sort_key(venue: dict[str, Any]) -> tuple[Any, ...]:\n    tb = venue.get("tie_break") or {}\n    return (\n        -float(venue.get("rcs_final") or 0),\n        -int(tb.get("review_volume") or 0),\n        -float(tb.get("recent_90_weighted_sentiment") or -1000000000.0),\n        -float(tb.get("category_normalised_score") or -1000000000.0),\n        str(tb.get("first_indexed_date") or "9999-12-31"),\n        str(tb.get("venue_name") or venue.get("name") or "").lower(),\n    )\n\n\n'''
              text = text.replace(insert_after, helper + insert_after)
          text = text.replace('eligible.sort(key=lambda row: row[0], reverse=True)', 'eligible.sort(key=lambda row: rcs_sort_key(row[0], row[2], row[3], row[2].get("name") or row[3].get("n") or row[1]))')
          if '"tie_break": tiebreak_values(item, rec, name),' not in text:
              text = text.replace('            "methodology_label": "See RCS methodology",\n            "public_override": override_notes or None,\n', '            "methodology_label": "See RCS methodology",\n            "tie_break": tiebreak_values(item, rec, name),\n            "tie_break_note": None,\n            "public_override": override_notes or None,\n')
          text = text.replace('primary = max(members, key=lambda v: float(v.get("rcs_final") or 0))', 'primary = sorted(members, key=venue_sort_key)[0]')
          text = text.replace('for v in sorted(members, key=lambda v: float(v.get("rcs_final") or 0), reverse=True)', 'for v in sorted(members, key=venue_sort_key)')
          text = text.replace('merged_venues.sort(key=lambda v: float(v.get("rcs_final") or 0), reverse=True)', 'merged_venues.sort(key=venue_sort_key)')
          text = text.replace('v["public_visibility_label"] = "Public top 10" if rank <= top_n else "Tracked in live market"', 'v["public_visibility_label"] = "Public top 30 overall" if rank <= top_n else "Tracked in live market"')
          if 'previous_v = ranked_venues[-1] if ranked_venues else None' not in text:
              text = text.replace('        v["rank"] = rank\n        v["public_visibility_label"]', '        previous_v = ranked_venues[-1] if ranked_venues else None\n        v["rank"] = rank\n        v["tie_break_note"] = explanation_for_venue(v, previous_v)\n        v["public_visibility_label"]')
          text = text.replace('category_rankings = build_category_rankings(ranked_venues, per_category=3)', 'category_rankings = build_category_rankings(ranked_venues, per_category=30)')
          text = text.replace('"methodology_version": "V4 DayDine RCS official-source mode",', '"methodology_version": "DayDine RCS v3.4.1 — V4 official-source mode with deterministic tie-breaks",')
          text = text.replace('parser.add_argument("--top-n", type=int, default=10)', 'parser.add_argument("--top-n", type=int, default=30)')
          p.write_text(text, encoding='utf-8')

          # --- Patch scripts/build_area_rankings_v4.py defaults -----------
          p = Path('scripts/build_area_rankings_v4.py')
          text = p.read_text(encoding='utf-8')
          text = text.replace('top_n=int(area.get("top_n", 10)),', 'top_n=int(area.get("top_n", 30)),')
          p.write_text(text, encoding='utf-8')

          # --- Patch ranking area config top_n values ---------------------
          p = Path('data/ranking_areas.json')
          if p.exists():
              text = p.read_text(encoding='utf-8')
              text = re.sub(r'"top_n"\s*:\s*10', '"top_n": 30', text)
              p.write_text(text, encoding='utf-8')

          # --- Patch tracking snapshot ------------------------------------
          p = Path('operator_intelligence/tracking_snapshot.py')
          text = p.read_text(encoding='utf-8')
          text = text.replace('gap-to-public thresholds', 'gap-to-public top-30 thresholds')
          if 'from operator_intelligence.ranking_tiebreaker import' not in text:
              text = text.replace('from typing import Any, Callable\n', 'from typing import Any, Callable\n\nfrom operator_intelligence.ranking_tiebreaker import (\n    sort_key as rcs_sort_key,\n    tiebreak_values,\n    explanation_for_venue,\n)\n')
          if '"score_block": score_block,' not in text:
              text = text.replace('        "category": _category(record),\n    }', '        "category": _category(record),\n        "score_block": score_block,\n        "record": record,\n        "tie_break": tiebreak_values(score_block, record, name),\n        "tie_break_note": None,\n    }')
          text = text.replace('rows.sort(key=lambda r: r["score"], reverse=True)', 'rows.sort(key=lambda r: rcs_sort_key(r["score"], r.get("score_block") or {}, r.get("record") or {}, r.get("name") or ""))\n    for i, row in enumerate(rows):\n        row["tie_break_note"] = explanation_for_venue({**row, "rcs_final": row["score"]}, ({**rows[i - 1], "rcs_final": rows[i - 1]["score"]} if i else None))')
          text = text.replace('if rank <= 10:\n        return "Public top 10 overall"\n    if category_rank <= 3:\n        return "Public category top 3"', 'if rank <= 30:\n        return "Public top 30 overall"\n    if category_rank <= 30:\n        return "Category top 30"')
          text = text.replace('top10_gap = _gap_text(rank, current_score, rows, 10, "public top 10")', 'top30_gap = _gap_text(rank, current_score, rows, 30, "public top 30")')
          text = text.replace('cat3_gap = _gap_text(category_rank, current_score, category_rows, 3, f"{_short_category(category)} top 3")', 'cat30_gap = _gap_text(category_rank, current_score, category_rows, 30, f"{_short_category(category)} top 30")')
          text = text.replace('Public category visibility starts at top 3', 'Public category visibility runs to the category top 30')
          text = text.replace('| Gap to public top 10 | {top10_gap} | Shows whether the venue is close to public overall visibility |', '| Gap to public top 30 | {top30_gap} | Shows whether the venue is close to public overall visibility |')
          text = text.replace('| Gap to category top 3 | {cat3_gap} | Shows whether the venue is close to category visibility |', '| Gap to category top 30 | {cat30_gap} | Shows whether the venue is close to category visibility |')
          if 'Tie-break status' not in text:
              text = text.replace('    out(f"| Monthly movement | {movement} | Used to track whether actions are translating into visible progress |")\n', '    out(f"| Monthly movement | {movement} | Used to track whether actions are translating into visible progress |")\n    if current.get("tie_break_note"):\n        out(f"| Tie-break status | Joint score | {current[\'tie_break_note\']} |")\n')
          text = text.replace('if rank <= 10 or category_rank <= 3:', 'if rank <= 30 or category_rank <= 30:')
          text = text.replace('top-10/category-top-3 gap', 'top-30/category-top-30 gap')
          p.write_text(text, encoding='utf-8')

          # --- Patch example generator ------------------------------------
          p = Path('scripts/generate_operator_tracking_example.py')
          text = p.read_text(encoding='utf-8')
          if 'from operator_intelligence.ranking_tiebreaker import' not in text:
              text = text.replace('from typing import Any\n', 'from typing import Any\n\nfrom operator_intelligence.ranking_tiebreaker import (\n    sort_key as rcs_sort_key,\n    tiebreak_values,\n    explanation_for_venue,\n)\n')
          if '"score_block": block,' not in text:
              text = text.replace('            "confidence_class": block.get("confidence_class") or "",\n        })', '            "confidence_class": block.get("confidence_class") or "",\n            "score_block": block,\n            "record": record,\n            "tie_break": tiebreak_values(block, record, block.get("name") or record.get("n") or str(key)),\n            "tie_break_note": None,\n        })')
          text = text.replace('rows.sort(key=lambda r: r["score"], reverse=True)', 'rows.sort(key=lambda r: rcs_sort_key(r["score"], r.get("score_block") or {}, r.get("record") or {}, r.get("name") or ""))\n    for i, row in enumerate(rows):\n        row["tie_break_note"] = explanation_for_venue({**row, "rcs_final": row["score"]}, ({**rows[i - 1], "rcs_final": rows[i - 1]["score"]} if i else None))')
          text = text.replace('if rank <= 10:\n        return "Public top 10 overall"\n    if category_rank <= 3:\n        return "Public category top 3"', 'if rank <= 30:\n        return "Public top 30 overall"\n    if category_rank <= 30:\n        return "Category top 30"')
          text = text.replace('Gap to public top 10', 'Gap to public top 30')
          text = text.replace("gap_text(rank, current_score, rows, 10, 'public top 10')", "gap_text(rank, current_score, rows, 30, 'public top 30')")
          text = text.replace('Gap to category top 3', 'Gap to category top 30')
          text = text.replace("gap_text(category_rank, current_score, category_rows, 3, venue['category'].replace(' (General)', '') + ' top 3')", "gap_text(category_rank, current_score, category_rows, 30, venue['category'].replace(' (General)', '') + ' top 30')")
          text = text.replace('Public category visibility starts at top 3', 'Public category visibility runs to the category top 30')
          if 'Tie-break status' not in text:
              text = text.replace('    out("| Monthly movement | Baseline month | Next report can show up/down movement when prior snapshot is supplied |")\n', '    out("| Monthly movement | Baseline month | Next report can show up/down movement when prior snapshot is supplied |")\n    if venue.get("tie_break_note"):\n        out(f"| Tie-break status | Joint score | {venue[\'tie_break_note\']} |")\n')
          text = text.replace('if rank <= 10 or category_rank <= 3:', 'if rank <= 30 or category_rank <= 30:')
          text = text.replace('top-10/category-top-3 gap', 'top-30/category-top-30 gap')
          p.write_text(text, encoding='utf-8')
          PY

      - name: Regenerate public ranking JSON and Lambs example
        run: |
          python scripts/build_area_rankings_v4.py \
            --scores stratford_rcs_v4_scores.json \
            --establishments stratford_establishments.json
          python scripts/build_area_rankings_v4.py \
            --scores leamington_rcs_v4_scores.json \
            --establishments leamington_establishments.json \
            --areas <(cat <<'JSON'
          {"areas":[{"slug":"leamington-spa","display_name":"Leamington Spa","la_name":"Warwick","region":"Warwickshire","area_type":"town","public":true,"operator":true,"centre":{"lat":52.2852,"lon":-1.5201},"radius_km":4.0,"top_n":30,"description":"Town-centre diner guide for Leamington Spa and nearby walkable/short-trip venues."}]}
          JSON
          )
          python scripts/generate_operator_tracking_example.py \
            --market stratford \
            --venue "Lambs" \
            --out outputs/examples/Lambs_tracking_snapshot_example.md

      - name: Add methodology note
        run: |
          cat > docs/DayDine-RCS-v3.4.1-Tie-Breaks-and-Visibility.md <<'MD'
          # DayDine RCS v3.4.1 — Tie-breaks and public visibility

          This methodology patch updates the public and operator visibility model.

          ## Deterministic tie-breaks

          When two venues share the same rounded DayDine Restaurant Confidence Score, rank order is resolved in this order:

          1. higher review volume;
          2. higher recent-90-day weighted sentiment, where available;
          3. higher category-normalised score, where available;
          4. earliest first-indexed date, where available;
          5. alphabetical venue name as the final fallback.

          Reports and ranking JSON surface this as:

          > Joint score / rank resolved by tie-break rules: [deciding rule].

          If a data field is not yet available, the system skips to the next available deterministic rule.

          ## Public visibility model

          Public guides now expose:

          - top 30 overall; and
          - category lists up to 30 venues per category.

          Operator tracking snapshots use the same thresholds:

          - Public visibility: Public top 30 overall;
          - Category visibility: Category top 30;
          - gap to public top 30; and
          - gap to category top 30.
          MD

      - name: Smoke test generated Lambs snapshot
        run: |
          grep -q "Gap to public top 30" outputs/examples/Lambs_tracking_snapshot_example.md
          grep -q "Category top 30" outputs/examples/Lambs_tracking_snapshot_example.md
          grep -q "#9 of 169" outputs/examples/Lambs_tracking_snapshot_example.md
          grep -q "#3 of 56" outputs/examples/Lambs_tracking_snapshot_example.md
          python - <<'PY'
          import json
          s=json.load(open('assets/rankings/stratford-upon-avon.json'))
          assert s['top_n'] == 30, s['top_n']
          assert all(c['top_n'] <= 30 for c in s['category_rankings'])
          assert any(v.get('tie_break_note') for v in s['venues']), 'expected at least one surfaced tie-break note in visible top 30'
          print('Stratford top_n:', s['top_n'])
          print('Restaurant category top_n:', [c['top_n'] for c in s['category_rankings'] if c['category']=='Restaurant (General)'][:1])
          PY

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scripts/build_rankings_v4.py scripts/build_area_rankings_v4.py scripts/generate_operator_tracking_example.py operator_intelligence/tracking_snapshot.py data/ranking_areas.json assets/rankings/*.json outputs/examples/Lambs_tracking_snapshot_example.md docs/DayDine-RCS-v3.4.1-Tie-Breaks-and-Visibility.md
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "Apply deterministic tie-breaks and top-30 visibility model"
          git push
