name: Collect Menu Data & Score

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect-and-score:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests beautifulsoup4
      - name: Fetch establishments from Firebase
        run: python .github/scripts/fetch_firebase_stratford.py
      - name: Merge existing enrichment data
        run: |
          python .github/scripts/merge_enrichment.py
          python .github/scripts/merge_tripadvisor.py || true
      - name: Collect menu data
        run: python .github/scripts/collect_menus.py
      - name: Merge menu data
        run: python .github/scripts/merge_menus.py
      - name: Run RCS scoring
        run: python rcs_scoring_stratford.py --from-cache
      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git stash
          git pull --rebase origin main
          git stash pop || true
          git add -A
          git diff --cached --quiet && echo "No changes after pull" && exit 0
          git commit -m "Collect menu data and re-score RCS"
          git push
