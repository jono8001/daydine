name: Generate market readiness assets

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'scripts/check_market_readiness.py'
      - 'scripts/generate_market_readiness.py'
      - 'tests/test_market_data_integrity.py'
      - 'data/ranking_areas.json'
      - 'data/entity_aliases.json'
      - 'data/known_missing_*_venues.json'
      - 'stratford_establishments.json'
      - 'stratford_rcs_v4_scores.json'
      - 'stratford_entity_resolution_report.json'
      - 'assets/rankings/*.json'
      - 'admin-markets.html'
      - '.github/workflows/generate_market_readiness.yml'
      - '.github/triggers/generate_market_readiness.txt'

permissions:
  contents: write

concurrency:
  group: generate-market-readiness
  cancel-in-progress: false

jobs:
  generate:
    name: Generate committed admin readiness JSON
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate market readiness assets
        run: python scripts/generate_market_readiness.py

      - name: Run market integrity tests
        run: python -m tests.test_market_data_integrity

      - name: Commit readiness assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/market-readiness
          git diff --cached --quiet && echo "No readiness changes to commit" && exit 0
          git commit -m "Generate market readiness assets"
          git push
