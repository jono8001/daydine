name: One-off Restore UK Lookup With Scoring Status

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/oneoff_restore_uk_lookup.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  restore-uk-lookup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Restore UK lookup page and reframe as DayDine partial/full records
        run: |
          set -euo pipefail
          git show 1a0aeaf:search.html > uk-establishments.html
          python - <<'PY'
          from pathlib import Path

          p = Path('uk-establishments.html')
          text = p.read_text(encoding='utf-8')

          replacements = {
              'UK Restaurant Database — Search 264,791 Establishments | DayDine': 'UK Establishment Lookup — Search 264,791 Records | DayDine',
              'UK Restaurant Database — DayDine': 'UK Establishment Lookup — DayDine',
              'Search the full UK restaurant database. 264,791 establishments with FSA hygiene ratings, Google scores, inspection data, and sub-scores. Search by town, city, or postcode.': 'Search the wider UK establishment lookup. Fully scored DayDine markets are labelled; other areas appear as partial DayDine records until their local area is processed.',
              'Search 264,791 UK restaurants. FSA hygiene ratings, Google scores, inspection histories, and sub-scores.': 'Search 264,791 UK establishment records. Fully scored DayDine markets are labelled; other areas appear as partial DayDine records.',
              'Search · <b>264,791 establishments</b>': 'UK lookup · <b>partial + fully scored records</b>',
              '<div class="kicker kicker-accent mb-1">UK Restaurant Database</div>': '<div class="kicker kicker-accent mb-1">UK establishment lookup</div>',
              '<h1 class="h-display h-display-md" style="margin-bottom: 8px;">Search 264,791 establishments</h1>': '<h1 class="h-display h-display-md" style="margin-bottom: 8px;">Search all DayDine establishment records</h1>',
              'Search any location across the UK. View FSA hygiene ratings, Google scores, inspection histories, and sub-scores across the full national register.': 'Search any location across the UK. Fully scored markets use the DayDine Restaurant Confidence Score; other areas show partial DayDine records until their local area is processed.',
              'Enter a town, city or postcode to search the UK restaurant database.': 'Enter a town, city or postcode to search the UK establishment lookup.',
              'Establishment search': 'UK establishment lookup',
              'View FSA hygiene ratings, Google scores, inspection histories, and sub-scores across the full national register.': 'View DayDine record status, public ratings where available, inspection history and establishment details across the national lookup.',
              'FSA Rating': 'Record rating',
              'How RCS V4 works': 'How DayDine RCS works',
          }
          for old, new in replacements.items():
              text = text.replace(old, new)

          # Add styling for scoring-status badges.
          style = '''
    .score-status {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 999px;
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      white-space: nowrap;
    }
    .score-status.full { background: var(--band-excellent-bg); color: var(--band-excellent-fg); }
    .score-status.partial { background: var(--surface-3); color: var(--text-muted); }
    .record-note { display:block; margin-top:4px; font-size:11px; color:var(--text-subtle); line-height:1.35; }
'''
          if '.score-status {' not in text:
              text = text.replace('    /* ---- Pagination ---- */', style + '\n    /* ---- Pagination ---- */', 1)

          # Add a status column to the table if not present.
          header_anchor = '<th class="sortable" data-key="r">Record rating <span class="arrow"></span></th>'
          if '<th>DayDine status</th>' not in text and header_anchor in text:
              text = text.replace(header_anchor, '<th>DayDine status</th>\n            ' + header_anchor, 1)

          # Inject helper functions before the render logic.
          helper = r'''
  function normStatusText(value) {
    return String(value || '').toLowerCase().replace(/[^a-z0-9]+/g, ' ').trim();
  }
  function isFullyScoredMarket(rec) {
    const la = normStatusText(rec.la || rec.local_authority || '');
    const pc = normStatusText(rec.pc || rec.postcode || '');
    const name = normStatusText(rec.n || rec.name || '');
    // Stratford-upon-Avon is live; Leamington becomes live once the Leamington workflow produces assets/rankings/leamington-spa.json.
    if (pc.indexOf('cv37') === 0 || la.indexOf('stratford') >= 0) return true;
    if (pc.indexOf('cv31') === 0 || pc.indexOf('cv32') === 0 || name.indexOf('leamington') >= 0) return true;
    return false;
  }
  function scoringStatusHtml(rec) {
    if (isFullyScoredMarket(rec)) {
      return '<span class="score-status full">Fully scored market</span><span class="record-note">Assessed with the DayDine Restaurant Confidence Score. Local ranking and category visibility available where this venue appears in the public guide.</span>';
    }
    return '<span class="score-status partial">Partial DayDine record</span><span class="record-note">Area pending full RCS scoring. Basic establishment information only; no local DayDine rank yet.</span>';
  }
  function safeLink(url, label) {
    if (!url) return '';
    const href = String(url).startsWith('http') ? String(url) : 'https://' + String(url);
    return '<a href="' + esc(href) + '" target="_blank" rel="noopener">' + esc(label || 'Website') + '</a>';
  }
'''
          if 'function scoringStatusHtml(rec)' not in text:
              marker = '  // ---- Haversine distance (miles) ----'
              text = text.replace(marker, helper + '\n' + marker, 1)

          # Best-effort row-column injection. The restored page renders rows using template strings.
          # Insert the new cell before the rating cell in common variants.
          if 'data-label="DayDine status"' not in text:
              text = text.replace(
                  '<td data-label="FSA Rating">',
                  '<td data-label="DayDine status">${scoringStatusHtml(r)}</td>\n            <td data-label="Record rating">'
              )
              text = text.replace(
                  '<td data-label="Rating">',
                  '<td data-label="DayDine status">${scoringStatusHtml(r)}</td>\n            <td data-label="Record rating">'
              )

          # Add contact details to the expanded detail block where fields exist.
          if 'Contact details' not in text:
              text = text.replace(
                  '<div class="detail-section-title">Details</div>',
                  '<div class="detail-section-title">Details</div>',
                  1
              )
              # Append a contact snippet near website/Google detail if possible.
              text = text.replace(
                  '</div>\n          </div>\n        </td>\n      </tr>',
                  '<div class="detail-section"><div class="detail-section-title">Contact details</div><div class="detail-grid"><div><div class="dl-label">Website</div><div class="dl-val">${r.web_url ? safeLink(r.web_url, \'Website\') : \'—\'}</div></div><div><div class="dl-label">Phone</div><div class="dl-val">${esc(r.phone || r.nationalPhoneNumber || r.internationalPhoneNumber || \'—\')}</div></div></div></div></div>\n          </div>\n        </td>\n      </tr>',
                  1
              )

          p.write_text(text, encoding='utf-8')
          PY

      - name: Add link from search page to UK lookup
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path('search.html')
          text = p.read_text(encoding='utf-8')
          if '/uk-establishments' not in text:
              text = text.replace(
                  '<a class="secondary" href="/rankings/stratford-upon-avon">Open Stratford guide</a>',
                  '<a class="secondary" href="/rankings/stratford-upon-avon">Open Stratford guide</a>\n      <a class="secondary" href="/uk-establishments">Open UK lookup</a>',
                  1,
              )
              text = text.replace(
                  "alert('Enter Stratford-upon-Avon to see fully scored DayDine results. Wider UK partial-record lookup will be reintroduced separately.');",
                  "window.location.href='/uk-establishments';",
                  1,
              )
              p.write_text(text, encoding='utf-8')
          PY

      - name: Add clean URL rewrite for UK lookup
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          p = Path('vercel.json')
          data = json.loads(p.read_text())
          rewrites = data.setdefault('rewrites', [])
          if not any(r.get('source') == '/uk-establishments' for r in rewrites):
              rewrites.append({'source': '/uk-establishments', 'destination': '/uk-establishments.html'})
          p.write_text(json.dumps(data, indent=2) + '\n')
          PY

      - name: Commit UK lookup restoration
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add uk-establishments.html search.html vercel.json
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "Restore UK lookup with DayDine scoring status labels"
          git push
