name: Collect Reviews (Playwright)

# TripAdvisor collection is DEFERRED as of the architectural pivot
# (see docs/ADR-001-TripAdvisor-Deferral.md). Google Places is now
# the canonical entity-resolution layer. Scheduled execution of this
# workflow is disabled so we don't burn runner minutes on a known-
# blocked path. It remains available via workflow_dispatch for
# anyone testing a revival path or running a one-off experiment.
#
# To revive:
#   1. Read docs/ADR-001-TripAdvisor-Deferral.md §"Conditions that
#      would justify reviving".
#   2. Uncomment the `schedule:` block below.
#   3. Update the ADR to record the revival rationale.

on:
  workflow_dispatch:
    inputs:
      limit:
        description: 'Number of restaurants to collect (0 = all)'
        required: false
        default: '0'
      max_reviews:
        description: 'Max reviews per restaurant'
        required: false
        default: '50'
  # schedule:
  #   - cron: '0 2 1,15 * *'  # 1st and 15th of month at 2am UTC
  #   (DISABLED — see ADR-001; TripAdvisor deferred.)

permissions:
  contents: write

jobs:
  collect-reviews:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright beautifulsoup4 requests
          playwright install chromium
          playwright install-deps

      - name: Collect Google Reviews
        run: |
          LIMIT_ARG=""
          if [ "${{ github.event.inputs.limit }}" != "0" ] && [ -n "${{ github.event.inputs.limit }}" ]; then
            LIMIT_ARG="--limit ${{ github.event.inputs.limit }}"
          fi
          MAX_ARG="${{ github.event.inputs.max_reviews || '50' }}"
          python .github/scripts/collect_google_reviews_playwright.py $LIMIT_ARG --max-reviews $MAX_ARG
        continue-on-error: true

      - name: Collect TripAdvisor Reviews
        run: |
          LIMIT_ARG=""
          if [ "${{ github.event.inputs.limit }}" != "0" ] && [ -n "${{ github.event.inputs.limit }}" ]; then
            LIMIT_ARG="--limit ${{ github.event.inputs.limit }}"
          fi
          MAX_ARG="${{ github.event.inputs.max_reviews || '50' }}"
          python .github/scripts/collect_tripadvisor_playwright.py $LIMIT_ARG --max-reviews $MAX_ARG
        continue-on-error: true

      - name: Merge Reviews
        run: python .github/scripts/merge_multi_source_reviews.py

      - name: Update Establishments with Review Data
        run: python .github/scripts/merge_enrichment.py --include-reviews

      - name: Monitor Collection Health
        run: python .github/scripts/review_data_monitor.py
        continue-on-error: true

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git stash
          git pull --rebase origin main
          git stash pop || true
          git add -A
          git diff --cached --quiet && echo "No changes after pull" && exit 0
          git commit -m "chore: automated review collection $(date +%Y-%m-%d)"
          git push
