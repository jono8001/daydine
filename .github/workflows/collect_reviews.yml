name: Collect Reviews

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 1,15 * *'  # 1st and 15th of month at 2am UTC

permissions:
  contents: write

jobs:
  collect-reviews:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Collect Google Reviews
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
        run: python .github/scripts/collect_google_reviews_apify.py --limit 5
        continue-on-error: true

      - name: Collect TripAdvisor Reviews
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
        run: python .github/scripts/collect_tripadvisor_reviews_apify.py --limit 5
        continue-on-error: true

      - name: Merge Reviews
        run: python .github/scripts/merge_multi_source_reviews.py

      - name: Monitor Collection Health
        run: python .github/scripts/review_data_monitor.py
        continue-on-error: true

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && echo "No changes" && exit 0
          git stash
          git pull --rebase origin main
          git stash pop || true
          git add -A
          git commit -m "chore: automated review collection $(date +%Y-%m-%d)"
          git push
