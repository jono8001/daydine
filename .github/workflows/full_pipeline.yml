name: Full Pipeline (All Tiers)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  full-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: "Tier 1: Fetch FSA data from Firebase"
        run: python .github/scripts/fetch_firebase_stratford.py

      - name: "Tier 1+: Augment with all FSA business types"
        run: python .github/scripts/augment_fsa_stratford.py

      - name: "Tier 2: Enrich with Google Places"
        env:
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
        run: |
          python .github/scripts/enrich_google_stratford.py
          python .github/scripts/merge_enrichment.py

      - name: "Tier 3: Check web presence (website/FB/IG)"
        run: python .github/scripts/check_web_presence.py

      - name: "Tier 5: Score GBP completeness"
        run: python .github/scripts/gbp_completeness.py

      - name: "Tier 3: Collect TripAdvisor data (Apify)"
        continue-on-error: true
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
        run: |
          pip install apify-client
          python .github/scripts/collect_tripadvisor_apify.py
          python .github/scripts/merge_tripadvisor.py

      - name: "Tier 5: Collect menu data"
        run: |
          python .github/scripts/collect_menus.py
          python .github/scripts/merge_menus.py

      - name: "Tier 6: Collect editorial & awards data"
        run: |
          python .github/scripts/collect_editorial.py
          python .github/scripts/merge_editorial.py

      - name: "Tier 1+: Check FSA enforcement actions"
        run: |
          python .github/scripts/collect_enforcement.py
          python .github/scripts/merge_enforcement.py

      - name: "Tier 8: Companies House business viability"
        continue-on-error: true
        env:
          COMPANIES_HOUSE_API_KEY: ${{ secrets.COMPANIES_HOUSE_API_KEY }}
        run: python .github/scripts/collect_companies_house.py

      - name: "Sentiment: Aspect-based review analysis"
        run: python .github/scripts/sentiment_analysis.py

      - name: "Score: Run V2 RCS pipeline (all tiers)"
        run: python rcs_scoring_stratford.py --from-cache

      - name: "QA: Sanity check coverage"
        env:
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
        run: python .github/scripts/sanity_check_coverage.py

      - name: Commit all results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git stash
          git pull --rebase origin main
          git stash pop || true
          git add -A
          git diff --cached --quiet && echo "No changes after pull" && exit 0
          git commit -m "Full pipeline: all tiers, sentiment, web presence, sanity-checked"
          git push
