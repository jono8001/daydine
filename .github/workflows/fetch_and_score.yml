name: Fetch Stratford Data & Run RCS Scoring

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-and-score:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch from Firebase RTDB
        run: python .github/scripts/fetch_firebase_stratford.py

      - name: Run RCS scoring pipeline
        run: python rcs_scoring_stratford.py --from-cache

      - name: Commit data files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git stash
          git pull --rebase origin main
          git stash pop || true
          git add -A
          git diff --cached --quiet && echo "No changes after pull" && exit 0
          git commit -m "Add Stratford-on-Avon establishments data and RCS scores"
          git push
