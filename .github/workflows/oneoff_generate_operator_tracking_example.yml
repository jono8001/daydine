name: One-off Generate Operator Tracking Example

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/oneoff_generate_operator_tracking_example.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-example:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate Lambs tracking snapshot example
        run: |
          python scripts/generate_operator_tracking_example.py \
            --market stratford \
            --venue "Lambs" \
            --out outputs/examples/Lambs_tracking_snapshot_example.md

      - name: Generate Leamington example too
        run: |
          python scripts/generate_operator_tracking_example.py \
            --market leamington \
            --venue "GAIL" \
            --out outputs/examples/Leamington_GAIL_tracking_snapshot_example.md || true

      - name: Commit generated examples
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add outputs/examples/*.md
          git diff --cached --quiet && echo "No generated example changes" && exit 0
          git commit -m "Generate operator tracking snapshot examples"
          git push
