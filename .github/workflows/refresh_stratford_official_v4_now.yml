name: Refresh Stratford Official Google V4 Now

# One-shot trigger bump: 2026-04-24T12:18Z

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/refresh_stratford_official_v4_now.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-stratford-official-v4-now
  cancel-in-progress: false

jobs:
  refresh-stratford-official-v4:
    name: Official Google Places refresh + V4 Stratford public ranking
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: python -m pip install --upgrade pip requests

      - name: Fetch fresh Stratford FSA/Firebase base
        run: python .github/scripts/fetch_firebase_stratford.py

      - name: Enrich official FSA/FHRS business types
        run: python .github/scripts/enrich_fsa_business_types.py

      - name: Fresh official Google Places enrichment only
        env:
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
        run: python .github/scripts/enrich_google_stratford.py

      - name: Merge official Google enrichment into Stratford establishments
        run: python .github/scripts/merge_enrichment.py

      - name: Resolve entities
        run: python .github/scripts/resolve_entities.py

      - name: Run V4 scoring engine
        run: |
          python rcs_scoring_v4.py \
            --input stratford_establishments.json \
            --menus stratford_menus.json \
            --editorial stratford_editorial.json \
            --out-json stratford_rcs_v4_scores.json \
            --out-csv stratford_rcs_v4_scores.csv

      - name: Build configured town and district ranking JSON from V4
        run: |
          python scripts/build_area_rankings_v4.py \
            --scores stratford_rcs_v4_scores.json \
            --establishments stratford_establishments.json \
            --areas data/ranking_areas.json

      - name: V4 scoring regression checks
        run: |
          python -m tests.test_coverage_status
          python -m tests.test_v4_report_guardrails

      - name: Commit refreshed official-source V4 data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && echo "No changes to commit" && exit 0

          git stash
          git pull --rebase origin main
          git stash pop || true
          git add -A
          git diff --cached --quiet && echo "No changes after pull" && exit 0

          # Detect only real unresolved Git conflict markers.
          # Real markers are exactly "=======" on a line by itself, or
          # "<<<<<<< " / ">>>>>>> " followed by a ref. This avoids false
          # positives from decorative separator lines such as "==========".
          if git grep -n -E '^(<{7} .+|={7}$|>{7} .+)$' -- . ':!*.md' ':!.github/**' ; then
            echo "Conflict markers detected; refusing to commit"
            exit 1
          fi

          git commit -m "Refresh Stratford official Google Places data and V4 ranking"
          git push
