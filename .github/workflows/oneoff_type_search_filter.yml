name: One-off Type Search Filter Patch

# Trigger bump: 2026-04-25T04:36Z

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/oneoff_type_search_filter.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-type-search:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Add type filter routing to search and ranking pages
        run: |
          python - <<'PY'
          from pathlib import Path

          changed = False

          search_path = Path('search.html')
          search = search_path.read_text(encoding='utf-8')

          type_block = '''    <div class="fld">
      <label for="fType">Type</label>
      <select id="fType">
        <option value="">Any</option>
        <option value="Restaurant (General)">Restaurant</option>
        <option value="Cafe / Coffee Shop">Cafe / Coffee Shop</option>
        <option value="Bakery">Bakery</option>
        <option value="Pub / Bar">Pub / Bar</option>
        <option value="Takeaway / Delivery">Takeaway / Delivery</option>
        <option value="Hotel / Accommodation">Hotel / Accommodation</option>
      </select>
    </div>
'''
          if 'id="fType"' not in search:
              anchor = '    <div class="fld">\n      <label for="fRating">Rating</label>'
              if anchor in search:
                  search = search.replace(anchor, type_block + anchor, 1)
                  changed = True
              else:
                  print('WARNING: could not find rating anchor in search.html; Type dropdown not inserted')

          route_script = '''
<script id="daydine-type-search-routing">
(function () {
  function normalise(value) {
    return String(value || '').toLowerCase().replace(/[^a-z0-9]+/g, ' ').trim();
  }
  function isStratfordUponAvon(value) {
    var v = normalise(value);
    return v === 'stratford' || v.indexOf('stratford upon avon') >= 0 || v.indexOf('stratford on avon') >= 0 || v.indexOf('cv37') >= 0;
  }
  function routeTypeSearch(event) {
    var typeEl = document.getElementById('fType');
    var type = typeEl && typeEl.value;
    if (!type) return;
    var location = document.getElementById('fLocation') && document.getElementById('fLocation').value;
    if (isStratfordUponAvon(location)) {
      event.preventDefault();
      event.stopImmediatePropagation();
      window.location.href = '/rankings/stratford-upon-avon?type=' + encodeURIComponent(type);
      return false;
    }
    event.preventDefault();
    event.stopImmediatePropagation();
    alert('Type filters are currently available for live ranked guides. Try Location: Stratford-upon-Avon with Type: ' + type + '. For the full UK database, set Type to Any and search by name, town, city or postcode.');
    return false;
  }
  var btn = document.getElementById('btnSearch');
  if (btn && !btn.dataset.typeRoutingAttached) {
    btn.dataset.typeRoutingAttached = 'true';
    btn.addEventListener('click', routeTypeSearch, true);
  }
})();
</script>
'''
          if 'daydine-type-search-routing' not in search:
              search = search.replace('</body>', route_script + '\n</body>', 1)
              changed = True

          search_path.write_text(search, encoding='utf-8')

          ranking_path = Path('rankings/stratford-upon-avon.html')
          ranking = ranking_path.read_text(encoding='utf-8')
          ranking_helper = '''
<script id="daydine-type-prefilter-helper">
(function () {
  var requestedType = new URLSearchParams(window.location.search).get('type');
  if (!requestedType) return;
  var attempts = 0;
  var timer = setInterval(function () {
    attempts += 1;
    var sel = document.getElementById('fCategory');
    if (!sel || !sel.options || sel.options.length < 2) {
      if (attempts > 60) clearInterval(timer);
      return;
    }
    var match = Array.prototype.slice.call(sel.options).find(function(opt){
      return opt.value.toLowerCase() === requestedType.toLowerCase();
    });
    if (match) {
      sel.value = match.value;
      sel.dispatchEvent(new Event('change'));
      clearInterval(timer);
    } else if (attempts > 60) {
      clearInterval(timer);
    }
  }, 100);
})();
</script>
'''
          if 'daydine-type-prefilter-helper' not in ranking:
              ranking = ranking.replace('</body>', ranking_helper + '\n</body>', 1)
              ranking_path.write_text(ranking, encoding='utf-8')
              changed = True

          if not changed:
              print('No changes needed; type search patch already present')
          PY

      - name: Commit change
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add search.html rankings/stratford-upon-avon.html
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "Add intuitive type search for live ranking guides"
          git push
