<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow">
  <title>Client Dashboard — DayDine</title>
  <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@400;500;600;700;800&family=Newsreader:ital,wght@0,500;0,700;1,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/daydine.css">
  <style>
    main{max-width:1320px;margin:0 auto;padding:38px 24px 90px}.hero{display:grid;grid-template-columns:1.2fr .8fr;gap:20px;align-items:end}.title{font-family:var(--serif);font-size:clamp(42px,6vw,82px);line-height:.94;margin:8px 0 12px}.dek{max-width:820px;color:var(--text-muted);font-size:17px;line-height:1.6}.panel{background:var(--surface-1);border:1px solid var(--border);box-shadow:var(--shadow);padding:20px}.score-card{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.score{background:var(--surface-2);border:1px solid var(--border);padding:16px}.score b{display:block;font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.09em;color:var(--text-subtle);margin-bottom:7px}.score span{font-family:var(--serif);font-size:36px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:18px}.wide{grid-column:1/-1}.section-title{font-family:var(--serif);font-size:34px;line-height:1;margin:0 0 12px}.cards{display:grid;gap:10px}.mini{border:1px solid var(--border-soft);background:rgba(255,255,255,.22);padding:13px}.mini h3{margin:0 0 6px;font-size:16px}.muted{color:var(--text-muted);line-height:1.5}.pills{display:flex;gap:7px;flex-wrap:wrap;margin:12px 0}.pill{display:inline-flex;padding:5px 8px;border:1px solid var(--border);border-radius:999px;background:var(--surface-2);font-size:12px;font-weight:700;color:var(--accent)}table{width:100%;border-collapse:collapse;font-size:14px}th,td{text-align:left;border-bottom:1px solid var(--border-soft);padding:9px 7px}th{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--text-subtle)}.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px}.btn,button{display:inline-flex;align-items:center;justify-content:center;padding:11px 14px;border:1px solid var(--accent-dark);border-radius:var(--radius);text-decoration:none;background:linear-gradient(135deg,var(--accent),var(--accent-hover));font-weight:800;color:var(--text);cursor:pointer}.btn.secondary,button.secondary{background:var(--surface-1);border-color:var(--border);color:var(--accent)}.priority{border-left:4px solid var(--accent);padding-left:14px}.empty{max-width:860px;margin:46px auto;padding:24px;background:var(--surface-1);border:1px solid var(--border);box-shadow:var(--shadow);color:var(--text-muted);line-height:1.55}.context-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.context{border:1px solid var(--border-soft);background:rgba(255,255,255,.22);padding:16px}.context h3{margin:0 0 8px;font-size:19px}.context .big{font-family:var(--serif);font-size:42px;line-height:1;margin:10px 0}.context .label{font-family:var(--mono);font-size:10px;letter-spacing:.09em;text-transform:uppercase;color:var(--text-subtle)}.timeline{display:grid;gap:8px;margin-top:12px}.timeline-row{display:grid;grid-template-columns:110px repeat(4,1fr);gap:10px;align-items:center;border:1px solid var(--border-soft);background:rgba(255,255,255,.22);padding:10px}.timeline-row b{font-family:var(--mono);font-size:12px;color:var(--accent)}@media(max-width:900px){.hero,.grid,.context-grid{grid-template-columns:1fr}.score-card{grid-template-columns:1fr 1fr}.timeline-row{grid-template-columns:1fr 1fr}.title{font-size:46px}}@media(max-width:560px){.score-card{grid-template-columns:1fr}.timeline-row{grid-template-columns:1fr}}
  </style>
</head>
<body class="ed" data-page-type="client-dashboard">
<header class="masthead"><div class="masthead-inner"><a class="wordmark" href="/">Day<em>dine</em></a><div class="mast-issue">Client · <b>Dashboard</b></div><nav class="mast-nav"><a href="/client">Client portal</a><a href="/methodology">Methodology</a><button class="secondary" id="logoutBtn" type="button">Logout</button></nav></div></header>
<main id="app"><section class="empty">Checking secure dashboard access…</section></main>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="/assets/daydine-firebase.js"></script>
<script src="/assets/daydine-auth.js"></script>
<script>
const app=document.getElementById('app');
function esc(s){return DayDineAuth.esc(s);}function param(name){return new URLSearchParams(location.search).get(name);}function venueFromPath(){const parts=location.pathname.split('/').filter(Boolean);if(parts[0]==='client'&&parts[1]==='venues'&&parts[2])return parts[2];return param('venue')||'lambs';}
function score(label,value){return `<div class="score"><b>${esc(label)}</b><span>${esc(value==null?'—':value)}</span></div>`;}
function table(rows,cols){return `<table><thead><tr>${cols.map(c=>`<th>${esc(c.label)}</th>`).join('')}</tr></thead><tbody>${(rows||[]).map(r=>`<tr>${cols.map(c=>`<td>${esc(r[c.key])}</td>`).join('')}</tr>`).join('')}</tbody></table>`;}
function contextsBlock(data){const op=data.operator_context, pub=data.public_context;if(!op&&!pub)return '';const card=c=>`<div class="context"><div class="label">${esc(c.label||'Context')}</div><h3>${esc(c.market||'Market view')}</h3><div class="big">#${esc(c.overall_rank)} / ${esc(c.overall_total)}</div><p class="muted">${c.category_rank!=null?`Category #${esc(c.category_rank)} / ${esc(c.category_total)} ${esc(c.category_label||'')}`:'Category movement unavailable in this view.'}</p><p class="muted">${esc(c.visibility||'')}</p><p class="muted"><small>${esc(c.note||'')}</small></p></div>`;return `<article class="panel wide"><h2 class="section-title">Two views of your position</h2><div class="context-grid">${op?card(op):''}${pub?card(pub):''}</div></article>`;}
function historyBlock(data){const h=data.history||[];const m=data.movement||{};return `<article class="panel wide"><h2 class="section-title">Movement over time</h2><p class="muted"><b>${esc(m.summary||'Baseline month — movement will appear after the next monthly snapshot.')}</b></p><div class="timeline">${h.map(row=>`<div class="timeline-row"><b>${esc(row.month)}</b><span>Overall #${esc(row.overall_rank)}</span><span>Category #${esc(row.category_rank)}</span><span>RCS ${esc(row.public_rcs)}</span><span>Reviews ${esc(row.google_review_count==null?'—':row.google_review_count)}</span></div>`).join('')||'<div class="mini">No history stored yet.</div>'}</div></article>`;}
function render(data){document.title=(data.venue||'Venue')+' Client Dashboard — DayDine';app.innerHTML=`<section class="hero"><div><div class="kicker kicker-accent">${esc(data.month||'Current')} protected dashboard</div><h1 class="title">${esc(data.venue||data.publicName||'Venue')}</h1><p class="dek">${esc((data.headline&&data.headline.tracking_status)||'Protected monthly operator intelligence snapshot.')}</p><div class="pills"><span class="pill">${esc(data.market||data.market_slug||'Market')}</span><span class="pill">${esc(data.category||'Venue')}</span><span class="pill">${esc(data.status||'ready')}</span><span class="pill">${esc(data.client_status||'client')}</span><span class="pill">${esc((data.scores&&data.scores.confidence_class)||data.evidence_confidence||'Evidence confidence')}</span>${data.report_aligned?'<span class="pill">Report-aligned fixture</span>':''}</div><div class="actions"><a class="btn secondary" href="/client">Back to client portal</a>${data.download_report_url?`<a class="btn secondary" href="${esc(data.download_report_url)}" target="_blank" rel="noopener">Open report/export</a>`:''}</div></div><div class="panel score-card">${score('Overall rank',(data.headline?('#'+data.headline.overall_rank+' / '+data.headline.overall_total):'—'))}${score('Category rank',(data.headline?('#'+data.headline.category_rank+' / '+(data.headline.category_total||'—')):'—'))}${score('Public RCS',data.scores&&data.scores.public_rcs)}${score('Operator score',data.scores&&data.scores.operator_v4_score)}</div></section><section class="grid">${contextsBlock(data)}${historyBlock(data)}<article class="panel"><h2 class="section-title">Monthly tracking</h2>${table(data.monthly_tracking,[{key:'label',label:'Metric'},{key:'value',label:'Current'},{key:'meaning',label:'Meaning'}])}</article><article class="panel"><h2 class="section-title">Commercial impact</h2><div class="cards"><div class="mini"><h3>${esc(data.commercial_impact&&data.commercial_impact.monthly_revenue_impact||'Directional only')}</h3><p class="muted">${esc(data.commercial_impact&&data.commercial_impact.wording_guardrail||'Exact numbers require operator first-party data.')}</p></div>${data.commercial_readiness_gap?`<div class="mini"><h3>Observed gap</h3><p class="muted">${esc(data.commercial_readiness_gap)}</p></div>`:''}</div></article><article class="panel wide"><h2 class="section-title">Action priorities</h2><div class="cards">${(data.priorities||[]).map((p,i)=>`<div class="mini priority"><h3>${i+1}. ${esc(p.title)}</h3><p class="muted"><b>${esc(p.target)}</b> — ${esc(p.why)}</p>${p.evidence?`<p class="muted"><b>Evidence:</b> ${esc(p.evidence)}</p>`:''}<p class="muted"><b>Action:</b> ${esc(p.action)}</p><p class="muted"><b>Expected upside:</b> ${esc(p.expected_upside)}</p></div>`).join('')||'<div class="mini">No priorities stored yet.</div>'}</div></article><article class="panel"><h2 class="section-title">Nearest competitors</h2>${table(data.nearest_competitors,[{key:'rank',label:'Rank'},{key:'venue',label:'Venue'},{key:'category',label:'Category'},{key:'rcs',label:'RCS'},{key:'gap',label:'Gap'}])}</article><article class="panel"><h2 class="section-title">Evidence families</h2><div class="cards">${(data.components||[]).map(c=>`<div class="mini"><h3>${esc(c.name)} · ${esc(c.score)}</h3><p class="muted">${esc(c.summary)}</p><p class="muted">${esc(c.evidence)}</p></div>`).join('')}</div></article><article class="panel wide"><h2 class="section-title">Final takeaway</h2><p class="muted">${esc(data.final_takeaway||'No final takeaway stored yet.')}</p></article></section>`;}
async function init(){
  const session=await DayDineAuth.requireAuth({roles:['admin','client','viewer'],target:'#app'});
  document.getElementById('logoutBtn').addEventListener('click',DayDineAuth.signOut);
  const venueId=venueFromPath();
  const ok=await DayDineAuth.canAccessVenue(session.profile,venueId);
  if(!ok){app.innerHTML='<section class="empty"><h1>Dashboard not assigned</h1><p>Your DayDine account is signed in, but this venue is not assigned to your profile.</p><p><a class="btn" href="/client">Back to client portal</a></p></section>';return;}
  try{render(await DayDineAuth.readSnapshot(venueId,param('month')||'latest'));}
  catch(err){console.error(err);app.innerHTML=`<section class="empty"><h1>Protected snapshot not seeded yet</h1><p>${esc(err.message||'No dashboard data found.')}</p><p>Seed the first fixture under <code>daydine_saas/operatorDashboards/${esc(venueId)}/snapshots/2026-04</code>. The reusable renderer is in place and is intentionally not hard-coded to Lambs.</p><p><a class="btn" href="/client">Back to client portal</a></p></section>`;}
}
init();
</script>
</body>
</html>
