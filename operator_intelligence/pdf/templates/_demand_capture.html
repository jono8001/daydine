<section class="section">
  <div class="section-head">
    <h2>Demand Capture Audit</h2>
    <span class="kicker">Digital shopfront readiness</span>
  </div>

  {% if demand_capture %}
  <div class="dc-grid">
    {% for label, verdict in demand_capture.items() %}
    <div class="dc-row">
      <span class="dc-label">{{ label }}</span>
      <span class="verdict {{ verdict | verdict_class }}">{{ verdict }}</span>
    </div>
    {% endfor %}
  </div>
  {% else %}
  <div class="empty">Demand capture audit not available for this venue.</div>
  {% endif %}
</section>
